<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinAnalytics AI — Redefinir Senha</title>
<link rel="stylesheet" href="/static/theme.css">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
.fa-topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;
  gap:16px;padding:0 20px;height:52px;background:#070f1a;border-bottom:1px solid #1e3a5f;
  box-shadow:0 2px 12px rgba(0,0,0,.4)}
.fa-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.fa-logo-text{font-family:'Georgia',serif;font-size:21px;font-weight:700;color:#e8f4fd;letter-spacing:-.3px}
.fa-logo-text em{color:#F0B429;font-style:normal}
.fa-ai-badge{display:inline-block;background:#1B3A6B;color:#fff;font-family:'Arial',sans-serif;
  font-size:13px;font-weight:800;letter-spacing:1.5px;padding:2px 5px;border-radius:3px;vertical-align:middle;margin-left:2px}
body{font-family:'Rajdhani',sans-serif;background:#0b1118;min-height:100vh;
  padding-top:52px;display:flex;align-items:center;justify-content:center}
.bg-grid{position:fixed;inset:0;top:52px;
  background-image:linear-gradient(rgba(0,196,140,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,196,140,.03) 1px,transparent 1px);
  background-size:40px 40px;z-index:0}
.bg-glow{position:fixed;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,196,140,.06) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);z-index:0;animation:pulse 4s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.1)}}
.container{position:relative;z-index:1;width:100%;max-width:420px;padding:20px}
.card{background:rgba(17,25,35,.95);border:1px solid #1e3a5f;border-radius:12px;
  padding:36px 32px;backdrop-filter:blur(10px)}
.card-title{font-size:22px;font-weight:700;color:#e8eaf6;margin-bottom:6px;letter-spacing:.5px}
.card-sub{font-size:16px;color:#8899aa;margin-bottom:24px;line-height:1.5}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:14px;font-weight:700;letter-spacing:.8px;
  color:#8899aa;text-transform:uppercase;margin-bottom:5px}
.form-input{width:100%;background:#0b1118;border:1px solid #1e3a5f;border-radius:6px;
  color:#e8eaf6;font-family:'JetBrains Mono',monospace;font-size:17px;
  padding:10px 12px;outline:none;transition:border .15s}
.form-input:focus{border-color:#00c48c}
.form-input::placeholder{color:#445566}
.btn-submit{width:100%;background:#00c48c;border:none;border-radius:7px;color:#000;
  font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;padding:12px;
  cursor:pointer;letter-spacing:.5px;transition:all .15s;margin-top:4px}
.btn-submit:hover{opacity:.88}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}
.btn-back{display:block;text-align:center;margin-top:16px;font-size:16px;color:#8899aa;
  text-decoration:none;transition:color .15s}
.btn-back:hover{color:#00c48c}
.error-msg{background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.3);
  border-radius:6px;color:#ff4757;font-size:16px;padding:8px 12px;margin-bottom:12px;display:none}
.error-msg.show{display:block}
.success-msg{background:rgba(0,196,140,.08);border:1px solid rgba(0,196,140,.3);
  border-radius:6px;color:#00c48c;font-size:16px;padding:8px 12px;margin-bottom:12px;display:none}
.success-msg.show{display:block}
.pw-bar{height:3px;border-radius:2px;margin-top:4px;transition:all .3s;background:#1e3a5f}
.pw-bar.weak{background:#ff4757;width:30%}
.pw-bar.medium{background:#ffb300;width:65%}
.pw-bar.strong{background:#00c48c;width:100%}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.3);
  border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Fase "esqueci" vs "nova senha" */
#phase-forgot{display:block}
#phase-reset{display:none}

.fa-logout-btn{display:flex;align-items:center;gap:6px;font-family:'Rajdhani','Arial',sans-serif;font-size:16px;font-weight:600;letter-spacing:.4px;color:#8899aa;text-decoration:none;padding:5px 10px;border-radius:5px;border:1px solid transparent;cursor:pointer;background:transparent;white-space:nowrap;transition:.15s;flex-shrink:0}
.fa-logout-btn:hover{color:#ff6b6b;background:rgba(255,107,107,.08);border-color:rgba(255,107,107,.2)}
.fa-user-chip{display:flex;align-items:center;gap:6px;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;color:#556677;letter-spacing:.3px;flex-shrink:0}
.fa-user-chip .fa-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#1B3A6B,#0b2040);border:1px solid #1e3a5f;display:flex;align-items:center;justify-content:center;font-size:14px;color:#8899aa}

@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}
</style>
</head>
<body>
<div class="fa-topbar">
  <a href="/" class="fa-logo">
    <svg width="34" height="34" viewBox="0 0 170 170" fill="none">
      <circle cx="85" cy="85" r="82" fill="#0D2144"/>
      <rect x="60" y="72" width="14" height="44" rx="2.5" fill="#2ED47A" opacity=".9"/>
      <rect x="82" y="50" width="14" height="58" rx="2.5" fill="#2ED47A"/>
      <rect x="126" y="44" width="14" height="68" rx="2.5" fill="#F0B429"/>
    </svg>
    <span class="fa-logo-text">Fin<em>Analytics</em> <span class="fa-ai-badge">AI</span></span>
  </a>
</div>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="container">
  <div class="card">

    <!-- FASE 1: Solicitar reset -->
    <div id="phase-forgot">
      <div class="card-title">🔑 Esqueci minha senha</div>
      <div class="card-sub">Informe seu e-mail cadastrado. Enviaremos um link para redefinir sua senha.</div>
      <div id="err1" class="error-msg"></div>
      <div id="suc1" class="success-msg"></div>
      <div class="form-group">
        <label class="form-label">E-mail cadastrado</label>
        <input class="form-input" type="email" id="forgot-email" placeholder="seu@email.com"
          onkeydown="if(event.key==='Enter')doForgot()">
      </div>
      <button class="btn-submit" id="btn-forgot" onclick="doForgot()">Enviar Link de Reset</button>
      <a href="/login" class="btn-back">← Voltar para o login</a>
    </div>

    <!-- FASE 2: Nova senha (via token na URL) -->
    <div id="phase-reset">
      <div class="card-title">🔒 Nova senha</div>
      <div class="card-sub">Escolha uma senha forte com pelo menos 8 caracteres.</div>
      <div id="err2" class="error-msg"></div>
      <div id="suc2" class="success-msg"></div>
      <div class="form-group">
        <label class="form-label">Nova senha</label>
        <input class="form-input" type="password" id="new-password" placeholder="••••••••"
          oninput="checkPw()" onkeydown="if(event.key==='Enter')doReset()">
        <div class="pw-bar" id="pw-bar"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar senha</label>
        <input class="form-input" type="password" id="confirm-password" placeholder="••••••••"
          onkeydown="if(event.key==='Enter')doReset()">
      </div>
      <button class="btn-submit" id="btn-reset" onclick="doReset()">Redefinir Senha</button>
      <a href="/login" class="btn-back">← Voltar para o login</a>
    </div>

  </div>
</div>

<script>
const API = '/api/v1/auth';

// Detecta se há token na URL → ativa fase de nova senha
const urlToken = new URLSearchParams(window.location.search).get('token');
if (urlToken) {
  document.getElementById('phase-forgot').style.display = 'none';
  document.getElementById('phase-reset').style.display  = 'block';
}

function showMsg(errId, sucId, type, msg) {
  document.getElementById(errId).classList.remove('show');
  document.getElementById(sucId).classList.remove('show');
  const el = document.getElementById(type === 'error' ? errId : sucId);
  el.textContent = msg;
  el.classList.add('show');
}
function setLoading(btnId, on, label) {
  const btn = document.getElementById(btnId);
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spinner"></span>Aguarde...' : label;
}

async function doForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) { showMsg('err1','suc1','error','Informe o e-mail.'); return; }
  setLoading('btn-forgot', true, 'Enviar Link de Reset');
  try {
    const res  = await fetch(`${API}/forgot-password`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email}),
    });
    const data = await res.json();

    // Modo dev: SMTP não configurado — exibe link diretamente
    if (data.dev_reset_url) {
      document.getElementById('phase-forgot').innerHTML = `
        <div class="card-title">⚙️ Modo Desenvolvimento</div>
        <div class="card-sub" style="margin-bottom:16px">
          SMTP não configurado. Use o link abaixo para redefinir a senha:        </div>
        <div style="background:#0b1118;border:1px solid #1e3a5f;border-radius:6px;
                    padding:12px;font-family:'JetBrains Mono',monospace;font-size:15px;
                    color:#00c48c;word-break:break-all;margin-bottom:16px">
          ${data.dev_reset_url}        </div>
        <a href="${data.dev_reset_url}" class="btn-submit" style="display:block;text-align:center;
           text-decoration:none;padding:12px;border-radius:7px;background:#00c48c;color:#000;
           font-weight:700;letter-spacing:.5px">
          Abrir link de reset →</a>
        <a href="/login" class="btn-back">← Voltar ao login</a>
      `;
      return;
    }

    showMsg('err1','suc1','success', data.message || 'Verifique sua caixa de entrada.');
  } catch(e) {
    showMsg('err1','suc1','error','Erro de conexão.');
  } finally {
    setLoading('btn-forgot', false, 'Enviar Link de Reset');
  }
}

async function doReset() {
  const newPw  = document.getElementById('new-password').value;
  const confPw = document.getElementById('confirm-password').value;
  if (newPw.length < 8) { showMsg('err2','suc2','error','Senha deve ter no mínimo 8 caracteres.'); return; }
  if (newPw !== confPw) { showMsg('err2','suc2','error','As senhas não coincidem.'); return; }
  setLoading('btn-reset', true, 'Redefinir Senha');
  try {
    const res  = await fetch(`${API}/reset-password`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({token: urlToken, new_password: newPw}),
    });
    const data = await res.json();
    if (!res.ok) { showMsg('err2','suc2','error', data.detail || 'Erro ao redefinir.'); return; }
    showMsg('err2','suc2','success', data.message + ' Redirecionando...');
    setTimeout(() => window.location.href = '/login', 2000);
  } catch(e) {
    showMsg('err2','suc2','error','Erro de conexão.');
  } finally {
    setLoading('btn-reset', false, 'Redefinir Senha');
  }
}

function checkPw() {
  const pw  = document.getElementById('new-password').value;
  const bar = document.getElementById('pw-bar');
  if (!pw.length) { bar.className='pw-bar'; return; }
  const s = (pw.length>=8?1:0)+(/[A-Z]/.test(pw)?1:0)+(/[0-9]/.test(pw)?1:0)+(/[^a-zA-Z0-9]/.test(pw)?1:0);
  bar.className = 'pw-bar ' + (s<=1?'weak':s<=2?'medium':'strong');
}
</script>
<script>
(function faAuth(){
  var token = localStorage.getItem('access_token');
  if (!token) return;
  var chip = document.getElementById('fa-user-chip');
  var nameEl = document.getElementById('fa-username');
  var avatarEl = document.getElementById('fa-avatar');
  if (chip) chip.style.display = 'flex';
  try {
    var b64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    var payload = JSON.parse(atob(b64));
    var email = payload.email || payload.sub || '';
    var name = email.split('@')[0];
    if (nameEl) nameEl.textContent = name;
    if (avatarEl) avatarEl.textContent = name.charAt(0).toUpperCase();
  } catch(e) {}
})();
function faLogout() {
  if (!confirm('Deseja sair?')) return;
  localStorage.removeItem('access_token');
  localStorage.removeItem('refresh_token');
  localStorage.removeItem('token_expires_at');
  sessionStorage.clear();
  window.location.replace('/login');
}
</script>
</body>
</html>
