<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<title>Subscrições Profit — FinAnalytics</title>
<style>
:root{--bg:#0a0e1a;--panel:#0f1520;--border:#1c2535;--text:#e2e8f0;--green:#2ED47A;--red:#E05555;--blue:#3ABFF8;--gold:#F0B429;--muted:#4a6080;--mono:'JetBrains Mono','Fira Code',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:17px;min-height:100vh}
.header{background:var(--panel);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px}
.header h1{font-size:19px;font-weight:700;letter-spacing:2px;color:var(--blue)}
.back{color:var(--muted);text-decoration:none;font-size:15px;padding:4px 10px;border:1px solid var(--border);border-radius:4px}
.back:hover{color:var(--blue);border-color:var(--blue)}
.content{max-width:900px;margin:32px auto;padding:0 24px}
.add-bar{display:flex;gap:8px;margin-bottom:24px}
.add-bar input{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-family:var(--mono);font-size:17px;outline:none}
.add-bar input:focus{border-color:var(--blue)}
.add-bar select{background:var(--panel);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-family:var(--mono);font-size:17px}
.btn{padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-family:var(--mono);font-size:16px;font-weight:700;letter-spacing:.5px;transition:.15s}
.btn-green{background:rgba(46,212,122,.15);color:var(--green);border:1px solid rgba(46,212,122,.3)}
.btn-green:hover{background:rgba(46,212,122,.25)}
.btn-red{background:rgba(224,85,85,.12);color:var(--red);border:1px solid rgba(224,85,85,.25);padding:4px 10px;font-size:15px}
.btn-red:hover{background:rgba(224,85,85,.22)}
.section{margin-bottom:28px}
.section-title{font-size:14px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ticker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.ticker-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;transition:.15s}
.ticker-card.active{border-color:rgba(46,212,122,.3);background:rgba(46,212,122,.04)}
.ticker-info{display:flex;flex-direction:column;gap:2px}
.ticker-name{font-weight:700;font-size:17px;color:var(--text)}
.ticker-type{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.ticker-exch{font-size:14px;color:var(--blue)}
.badge-on{display:inline-flex;align-items:center;gap:4px;background:rgba(46,212,122,.12);color:var(--green);border:1px solid rgba(46,212,122,.3);border-radius:4px;padding:2px 8px;font-size:14px;font-weight:700;cursor:pointer}
.badge-off{display:inline-flex;align-items:center;gap:4px;background:rgba(74,96,128,.12);color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:14px;font-weight:700;cursor:pointer}
.badge-on:hover{background:rgba(224,85,85,.12);color:var(--red);border-color:rgba(224,85,85,.3)}
.badge-off:hover{background:rgba(46,212,122,.12);color:var(--green);border-color:rgba(46,212,122,.3)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot.on{background:var(--green);box-shadow:0 0 5px var(--green)}
.dot.off{background:var(--muted)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:16px;z-index:999;animation:slidein .2s ease}
@keyframes slidein{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
</style></head><body>
<div class="header">
  <a href="/dashboard" class="back">← Dashboard</a>
  <h1>SUBSCRIÇÕES PROFIT AGENT</h1>
  <span style="margin-left:auto;font-size:15px;color:var(--muted)" id="agent-status">Verificando agente...</span>
</div>
<div class="content">
  <div class="add-bar">
    <input id="new-ticker" placeholder="Ticker (ex: BBAS3, MGLU3...)" maxlength="10" onkeydown="if(event.key==='Enter')addTicker()">
    <select id="new-exch"><option value="B">B — Bovespa/B3</option><option value="F">F — Futuro BMF</option><option value="N">N — NYSE</option></select>
    <button class="btn btn-green" onclick="addTicker()">+ SUBSCREVER</button>
  </div>
  <div class="section"><div class="section-title">Futuros</div><div class="ticker-grid" id="grid-future"></div></div>
  <div class="section"><div class="section-title">Ações</div><div class="ticker-grid" id="grid-stock"></div></div>
  <div class="section"><div class="section-title">FIIs</div><div class="ticker-grid" id="grid-fii"></div></div>
  <div class="section"><div class="section-title">Outros</div><div class="ticker-grid" id="grid-other"></div></div>
</div>
<script>
const API = '/api/v1';
let _token = localStorage.getItem('fa_token') || '';
const H = () => ({Authorization:'Bearer '+_token,'Content-Type':'application/json'});

async function load() {
  const r = await fetch(API+'/tickers/subscriptions', {headers:H()});
  if (!r.ok) { document.getElementById('grid-stock').innerHTML='<p style="color:var(--red)">Erro ao carregar</p>'; return; }
  const d = await r.json();
  const grids = {future:[],stock:[],fii:[],other:[]};
  (d.tickers||[]).forEach(t => {
    const type = t.ticker_type || 'other';
    const key = ['future','stock','fii'].includes(type) ? type : 'other';
    grids[key].push(t);
  });
  Object.entries(grids).forEach(([type,tickers]) => {
    document.getElementById('grid-'+type).innerHTML = tickers.length
      ? tickers.map(t => cardHTML(t)).join('')
      : '<span style="color:var(--muted);font-size:15px">Nenhum</span>';
  });
}

function cardHTML(t) {
  const on = t.profit_subscribed;
  const exch = t.profit_exchange || t.exchange || 'B';
  return `<div class="ticker-card ${on?'active':''}" id="card-${t.ticker}">
    <div class="ticker-info">
      <span class="ticker-name">${t.ticker}</span>
      <span class="ticker-type">${t.ticker_type||''}</span>
      <span class="ticker-exch">Exchange: ${exch}</span>    </div>
    <span class="${on?'badge-on':'badge-off'}" onclick="toggle('${t.ticker}','${exch}',${!on})">
      <span class="dot ${on?'on':'off'}"></span>
      ${on?'ATIVO':'INATIVO'}</span>  </div>`;
}

async function toggle(ticker, exchange, subscribe) {
  const r = await fetch(API+'/tickers/subscriptions/'+ticker, {
    method:'POST', headers:H(),
    body: JSON.stringify({subscribed:subscribe, exchange})
  });
  if (r.ok) { toast(ticker+' '+(subscribe?'subscrito':'removido')); load(); }
}

async function addTicker() {
  const ticker = document.getElementById('new-ticker').value.trim().toUpperCase();
  const exchange = document.getElementById('new-exch').value;
  if (!ticker) return;
  await toggle(ticker, exchange, true);
  document.getElementById('new-ticker').value = '';
}

async function checkAgent() {
  try {
    const r = await fetch(API+'/marketdata/status');
    const d = await r.json();
    const el = document.getElementById('agent-status');
    el.textContent = d.market_connected ? '● AGENTE CONECTADO' : '○ AGENTE OFFLINE';
    el.style.color = d.market_connected ? 'var(--green)' : 'var(--red)';
  } catch { document.getElementById('agent-status').textContent = '○ AGENTE OFFLINE'; }
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// Init
const saved = localStorage.getItem('fa_token');
if (saved) _token = saved;
load();
checkAgent();
setInterval(checkAgent, 10000);
</script>
<!-- ═══ PROFIT AGENT TICKERS (adicionado) ══════════════════════════════ -->
<div class="section" style="margin-top:40px;border-top:1px solid var(--border);padding-top:28px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
    <div class="section-title" style="margin:0;border:none">
      PROFIT AGENT — TICKERS
      <span id="pa-status" style="font-size:13px;margin-left:12px;color:var(--muted)">verificando...</span>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn" id="pa-tab-rt"
        style="background:rgba(58,191,248,.2);color:var(--blue);border:1px solid rgba(58,191,248,.3);padding:5px 12px;font-size:14px"
        onclick="paSwitchTab('rt')">Real-time</button>
      <button class="btn" id="pa-tab-hist"
        style="background:transparent;color:var(--muted);border:1px solid var(--border);padding:5px 12px;font-size:14px"
        onclick="paSwitchTab('hist')">Histórico</button>
      <button class="btn" id="pa-tab-add"
        style="background:rgba(46,212,122,.12);color:var(--green);border:1px solid rgba(46,212,122,.3);padding:5px 12px;font-size:14px"
        onclick="paSwitchTab('add')">+ Adicionar</button>
    </div>
  </div>

  <!-- Real-time -->
  <div id="pa-panel-rt">
    <div class="ticker-grid" id="pa-rt-grid">
      <span style="color:var(--muted);font-size:15px">Carregando...</span>
    </div>
  </div>

  <!-- Histórico -->
  <div id="pa-panel-hist" style="display:none">
    <div class="ticker-grid" id="pa-hist-grid">
      <span style="color:var(--muted);font-size:15px">Carregando...</span>
    </div>
  </div>

  <!-- Adicionar -->
  <div id="pa-panel-add" style="display:none">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

      <!-- Real-time form -->
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px">
        <div class="section-title" style="margin-bottom:14px">Real-time</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <input id="pa-rt-ticker" placeholder="Ticker (ex: PETR4)" maxlength="10"
            style="background:#0a0e1a;border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-family:var(--mono);font-size:15px;outline:none">
          <select id="pa-rt-exch"
            style="background:#0a0e1a;border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-family:var(--mono);font-size:15px">
            <option value="B">B — Bovespa/B3</option>
            <option value="F">F — Futuros</option>
          </select>
          <input id="pa-rt-notes" placeholder="Notas (opcional)"
            style="background:#0a0e1a;border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-family:var(--mono);font-size:15px;outline:none">
          <input id="pa-rt-priority" type="number" value="5" placeholder="Prioridade"
            style="background:#0a0e1a;border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-family:var(--mono);font-size:15px;outline:none">
          <button class="btn btn-green" style="font-size:15px" onclick="paAddRt()">+ Salvar Real-time</button>
        </div>
      </div>

      <!-- Histórico form -->
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px">
        <div class="section-title" style="margin-bottom:14px">Histórico</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <input id="pa-hist-ticker" placeholder="Ticker (ex: WINFUT)" maxlength="10"
            style="background:#0a0e1a;border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-family:var(--mono);font-size:15px;outline:none">
          <select id="pa-hist-exch"
            style="background:#0a0e1a;border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-family:var(--mono);font-size:15px">
            <option value="B">B — Bovespa/B3</option>
            <option value="F">F — Futuros</option>
          </select>
          <input id="pa-hist-from" placeholder="Desde (DD/MM/AAAA)"
            style="background:#0a0e1a;border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-family:var(--mono);font-size:15px;outline:none">
          <input id="pa-hist-notes" placeholder="Notas (opcional)"
            style="background:#0a0e1a;border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-family:var(--mono);font-size:15px;outline:none">
          <button class="btn btn-green" style="font-size:15px" onclick="paAddHist()">+ Salvar Histórico</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const PA = 'http://localhost:8002';

// Status do agent
(async () => {
  const el = document.getElementById('pa-status');
  try {
    const r = await fetch(PA + '/status');
    const d = await r.json();
    el.textContent = d.market_connected ? '● conectado' : '○ desconectado';
    el.style.color = d.market_connected ? 'var(--green)' : 'var(--red)';
  } catch {
    el.textContent = '○ offline (porta 8002)';
    el.style.color = 'var(--red)';
  }
})();

// Switch de abas
function paSwitchTab(tab) {
  ['rt','hist','add'].forEach(t => {
    document.getElementById('pa-panel-'+t).style.display = t===tab ? '' : 'none';
    const btn = document.getElementById('pa-tab-'+t);
    if (t === tab) {
      btn.style.background = t==='add' ? 'rgba(46,212,122,.25)' : 'rgba(58,191,248,.25)';
      btn.style.color = t==='add' ? 'var(--green)' : 'var(--blue)';
    } else {
      btn.style.background = 'transparent';
      btn.style.color = 'var(--muted)';
    }
  });
  if (tab === 'rt')   paLoadRt();
  if (tab === 'hist') paLoadHist();
}

// Carrega real-time
async function paLoadRt() {
  const grid = document.getElementById('pa-rt-grid');
  grid.innerHTML = '<span style="color:var(--muted)">Carregando...</span>';
  try {
    const d = await fetch(PA+'/tickers').then(r=>r.json());
    if (!d.tickers?.length) { grid.innerHTML='<span style="color:var(--muted)">Nenhum ticker cadastrado</span>'; return; }
    grid.innerHTML = d.tickers.map(t => `
      <div class="ticker-card ${t.active?'active':''}">
        <div class="ticker-info">
          <span class="ticker-name">${t.ticker}</span>
          <span class="ticker-exch">Exchange: ${t.exchange}</span>
          <span class="ticker-type">${t.notes||''}</span>
        </div>
        <span class="${t.active?'badge-on':'badge-off'}" onclick="paToggleRt('${t.ticker}','${t.exchange}',${!t.active})">
          <span class="dot ${t.active?'on':'off'}"></span>
          ${t.active?'ATIVO':'INATIVO'}
        </span>
      </div>`).join('');
  } catch(e) { grid.innerHTML='<span style="color:var(--red)">Erro: '+e.message+'</span>'; }
}

// Carrega histórico
async function paLoadHist() {
  const grid = document.getElementById('pa-hist-grid');
  grid.innerHTML = '<span style="color:var(--muted)">Carregando...</span>';
  try {
    const d = await fetch(PA+'/history/tickers').then(r=>r.json());
    if (!d.tickers?.length) { grid.innerHTML='<span style="color:var(--muted)">Nenhum ticker configurado</span>'; return; }
    grid.innerHTML = d.tickers.map(t => {
      const lastAt = t.last_collected_at ? new Date(t.last_collected_at).toLocaleDateString('pt-BR') : '—';
      const ticks  = t.last_tick_count   ? Number(t.last_tick_count).toLocaleString('pt-BR')        : '—';
      return `
        <div class="ticker-card ${t.active?'active':''}">
          <div class="ticker-info">
            <span class="ticker-name">${t.ticker}</span>
            <span class="ticker-exch">Exchange: ${t.exchange}</span>
            <span class="ticker-type" style="color:var(--gold)">${ticks} ticks · ${lastAt}</span>
          </div>
          <span class="${t.active?'badge-on':'badge-off'}" onclick="paToggleHist('${t.ticker}','${t.exchange}',${!t.active})">
            <span class="dot ${t.active?'on':'off'}"></span>
            ${t.active?'ATIVO':'INATIVO'}
          </span>
        </div>`;
    }).join('');
  } catch(e) { grid.innerHTML='<span style="color:var(--red)">Erro: '+e.message+'</span>'; }
}

// Toggles
async function paToggleRt(ticker, exchange, active) {
  const r = await fetch(PA+'/tickers/toggle',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ticker,exchange,active})}).then(r=>r.json()).catch(e=>({ok:false,error:e.message}));
  if (r.ok) { toast(ticker+' '+(active?'ativado':'pausado')); paLoadRt(); }
  else toast('Erro: '+(r.error||JSON.stringify(r)));
}

async function paToggleHist(ticker, exchange, active) {
  const r = await fetch(PA+'/history/tickers/toggle',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ticker,exchange,active})}).then(r=>r.json()).catch(e=>({ok:false,error:e.message}));
  toast(ticker+' histórico '+(active?'ativado':'pausado'));
  paLoadHist();
}

// Adicionar
async function paAddRt() {
  const ticker   = document.getElementById('pa-rt-ticker').value.trim().toUpperCase();
  const exchange = document.getElementById('pa-rt-exch').value;
  const notes    = document.getElementById('pa-rt-notes').value.trim();
  const priority = parseInt(document.getElementById('pa-rt-priority').value)||5;
  if (!ticker) { toast('Digite o ticker'); return; }
  const r = await fetch(PA+'/tickers/add',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ticker,exchange,active:true,subscribe_book:false,priority,notes})}).then(r=>r.json());
  if (r.ok) { toast(ticker+':'+exchange+' adicionado!'); document.getElementById('pa-rt-ticker').value=''; paLoadRt(); }
  else toast('Erro: '+JSON.stringify(r));
}

async function paAddHist() {
  const ticker   = document.getElementById('pa-hist-ticker').value.trim().toUpperCase();
  const exchange = document.getElementById('pa-hist-exch').value;
  const notes    = document.getElementById('pa-hist-notes').value.trim();
  const fromRaw  = document.getElementById('pa-hist-from').value.trim();
  if (!ticker) { toast('Digite o ticker'); return; }
  let collect_from = '2026-01-01 09:00:00';
  if (fromRaw) {
    const p = fromRaw.split('/');
    if (p.length===3) collect_from = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')} 09:00:00`;
  }
  const r = await fetch(PA+'/history/tickers/add',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ticker,exchange,active:true,collect_from,notes})}).then(r=>r.json());
  toast(ticker+':'+exchange+' histórico adicionado!');
  document.getElementById('pa-hist-ticker').value='';
  paLoadHist();
}

// Inicializa aba real-time
paLoadRt();
</script>

</body></html>
