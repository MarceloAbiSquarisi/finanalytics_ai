<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fundos CVM — FinAnalytics AI</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<meta name="description" content="FinAnalytics AI — plataforma quant para análise financeira, gestão de carteira e day trade.">
<meta name="robots" content="noindex, nofollow">
<meta property="og:title" content="FinAnalytics AI"><meta property="og:description" content="Plataforma quant para análise financeira, gestão de carteira e day trade."><meta property="og:type" content="website">
<script>(function(){try{var t=localStorage.getItem('fa_theme');if(t==='light'||t==='dark')document.documentElement.dataset.theme=t;}catch(e){}})();</script>
<link rel="stylesheet" href="/static/theme.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00d4ff">
<style>
:root{
  --bg:#080b10;--s1:#0d1117;--s2:#111822;--border:#1c2535;--border2:#253045;
  --text:#cdd6e0;--muted:#4a5e72;--accent:#00d4ff;--green:#00e676;--red:#ff3d5a;
  --gold:#F0B429;--purple:#a855f7;--orange:#fb923c;--yellow:#fbbf24;
  --sb-w:220px;--sb-w-collapsed:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:17px;min-height:100vh}
.fa-topbar{height:52px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;position:sticky;top:0;z-index:300}
.fa-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.fa-logo-text{font-family:monospace;font-size:17px;font-weight:600;color:var(--text-strong)}
.fa-logo-text em{color:var(--gold);font-style:normal}
.fa-ai-badge{background:var(--gold);color:#0a1628;font-size:12px;font-weight:800;padding:1px 5px;border-radius:3px;letter-spacing:.08em;vertical-align:middle;margin-left:2px}
.fa-user-chip{display:flex;align-items:center;gap:6px;margin-left:auto}
.fa-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#1B3A6B,#0b2040);border:1px solid #1e3a5f;display:flex;align-items:center;justify-content:center;font-size:14px;color:#8899aa}
.fa-logout-btn{background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:15px;padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.15s}
.fa-logout-btn:hover{color:var(--red);border-color:var(--red)}
.fa-sidebar{position:fixed;left:0;top:52px;bottom:0;width:var(--sb-w-collapsed);background:#0a0f18;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .22s cubic-bezier(.4,0,.2,1);z-index:200}
.fa-sidebar.open{width:var(--sb-w)}
.fa-sidebar-toggle{width:100%;padding:10px 14px;background:transparent;border:none;border-bottom:1px solid var(--border);color:#7a95b0;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:17px;white-space:nowrap;overflow:hidden}
.fa-sb-link{display:flex;align-items:center;gap:10px;padding:7px 14px;color:#6a8aa8;text-decoration:none;font-size:16px;white-space:nowrap;overflow:hidden;transition:all .15s}
.fa-sb-link:hover{color:var(--text-strong);background:rgba(0,212,255,.05)}
.fa-sb-link.active{color:var(--accent);background:rgba(0,212,255,.08);border-right:2px solid var(--accent)}
.fa-sb-link svg{flex-shrink:0}
.fa-sb-link span{opacity:0;transition:opacity .15s}
.fa-sidebar.open .fa-sb-link span{opacity:1}
.fa-page-content{margin-left:var(--sb-w-collapsed);transition:margin-left .22s cubic-bezier(.4,0,.2,1)}
body.sb-open .fa-page-content{margin-left:var(--sb-w)}
.main{padding:20px 24px;max-width:1400px}
.page-title{font-size:26px;font-weight:700;color:var(--text-strong);display:flex;align-items:center;gap:10px;margin-bottom:4px}
.page-sub{font-size:15px;color:var(--muted);margin-bottom:20px}
.section{margin-bottom:24px;background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:18px}
.sec-title{font-size:15px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.btn{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.25);border-radius:5px;color:var(--accent);font-size:15px;font-weight:600;padding:8px 16px;cursor:pointer;transition:.15s;font-family:inherit}
.btn:hover{background:rgba(0,212,255,.15)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-warn{background:rgba(251,191,36,.06);border-color:rgba(251,191,36,.3);color:var(--yellow)}
.btn-warn:hover{background:rgba(251,191,36,.13)}
.input{background:var(--s2);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-size:15px;padding:8px 10px;font-family:inherit;outline:none;width:100%;transition:.15s}
.input:focus{border-color:var(--accent)}
.tbl-wrap{border:1px solid var(--border);border-radius:6px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:#0a0f18;color:var(--muted);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:9px 14px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:9px 14px;font-size:14px;color:var(--text);border-bottom:1px solid rgba(28,37,53,.6)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(0,212,255,.015)}
.empty{text-align:center;color:var(--muted);font-style:italic;padding:30px}
.toast{position:fixed;bottom:24px;right:24px;padding:14px 18px;border-radius:8px;font-weight:600;font-size:15px;z-index:1000;animation:slideIn .25s ease-out;max-width:420px}
.toast-ok{background:rgba(0,230,118,.15);border:1px solid rgba(0,230,118,.4);color:var(--green)}
.toast-err{background:rgba(255,61,90,.15);border:1px solid rgba(255,61,90,.4);color:var(--red)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.sync-result{margin-top:10px;padding:10px 14px;background:var(--s2);border-radius:5px;font-family:monospace;font-size:13px;color:var(--green);display:none;white-space:pre-wrap;max-height:240px;overflow:auto}
.sync-result.err{color:var(--red)}
.search-row{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.search-row .input{flex:1;min-width:240px}
.cnpj{font-family:monospace;color:var(--muted);font-size:13px}
.denied{display:none}
</style>
</head>
<body>

<div class="fa-topbar">
  <a href="/" class="fa-logo">
    <span class="fa-logo-text">Fin<em>Analytics</em><span class="fa-ai-badge">AI</span></span>
  </a>
  <div class="fa-user-chip">
    <div class="fa-avatar" id="avatarInitial">?</div>
    <span id="topbarEmail" style="font-size:15px;color:var(--muted)"></span>
    <button class="fa-logout-btn" onclick="logout()">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Sair
    </button>
  </div>
</div>

<div class="fa-sidebar" id="sidebar"></div>

<div class="fa-page-content">
<div class="main" id="mainContent" style="display:none">

  <div class="page-title">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
    Fundos CVM
  </div>
  <div class="page-sub">Catalogo de fundos da CVM + sincronizacao de cadastro e informes diarios.</div>

  <!-- Sync (admin) -->
  <div class="section" id="syncSection" style="display:none">
    <div class="sec-title">Sincronizacao CVM <span style="color:var(--muted);font-weight:400;text-transform:none;font-size:13px;margin-left:6px">(admin)</span></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:end">
      <button class="btn btn-warn" id="btn-sync-cad" onclick="syncCadastro()">Sincronizar Cadastro</button>
      <div style="display:flex;gap:8px;align-items:end">
        <div>
          <label style="display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Competencia (YYYYMM)</label>
          <input type="text" id="sync-comp" maxlength="6" placeholder="ex: 202604" class="input" style="width:130px;font-family:monospace">
        </div>
        <button class="btn btn-warn" id="btn-sync-inf" onclick="syncInforme()">Sincronizar Informe Diario</button>
      </div>
    </div>
    <div class="sync-result" id="sync-result"></div>
  </div>

  <!-- Buscar fundo -->
  <div class="section">
    <div class="sec-title">Buscar Fundos</div>
    <div class="search-row">
      <input type="text" id="search-q" class="input" placeholder="Nome ou CNPJ (mínimo 3 chars)" oninput="onSearch()">
      <select id="search-tipo" class="input" style="width:200px" onchange="onSearch()">
        <option value="">Todos os tipos</option>
      </select>
    </div>
    <div class="tbl-wrap">
      <table data-fa-table>
        <thead>
          <tr><th>CNPJ</th><th>Nome</th><th>Tipo</th><th>Classe</th><th>Patrim. Liquido</th></tr>
        </thead>
        <tbody id="results">
          <tr class="empty"><td colspan="5">Digite ao menos 3 caracteres para buscar.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div class="denied" id="accessDenied" style="display:none;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:12px">
  <svg width="64" height="64" fill="none" stroke="var(--red)" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
  <div style="font-size:22px;color:#e2eaf4">Acesso negado</div>
</div>
</div><!-- /fa-page-content -->

<script src="/static/a11y.js"></script>
  <script src="/static/auth_guard.js"></script>
  <script src="/static/pwa_register.js"></script>
<script src="/static/sidebar.js"></script>
  <script src="/static/modal.js"></script>
  <script src="/static/form_validate.js"></script>
  <script src="/static/i18n.js"></script>
  <script src="/static/theme_toggle.js"></script>
  <script src="/static/locale_toggle.js"></script>
<script src="/static/breadcrumbs.js"></script>
<script src="/static/command_palette.js"></script>
<script src="/static/shortcuts.js"></script>
<script src="/static/notifications.js"></script>
<script src="/static/toast.js"></script>
  <script src="/static/error_handler.js"></script>
  <script src="/static/loading.js"></script>
  <script src="/static/print_helper.js"></script>
<script src="/static/empty_state.js"></script>
<script src="/static/onboarding.js"></script>
<script src="/static/table_utils.js"></script>
<script>
const API = '/api/v1/fundos';
let _user = null;
let _tipos = [];
let _searchTimer = null;

function logout() { FAAuth.clearTokens(); location.href = '/'; }
function H() { return FAAuth.headers(); }

// toast() local migrado para FAToast — wrapper compat
function toast(msg, kind) {
  if (kind === 'err') return FAToast.err(msg);
  return FAToast.ok(msg);
}

async function init() {
  _user = await FAAuth.requireAuth({});
  if (!_user) return;
  document.getElementById('mainContent').style.display = 'block';
  document.getElementById('topbarEmail').textContent = _user.email;
  document.getElementById('avatarInitial').textContent = (_user.full_name || _user.email)[0].toUpperCase();
  if (_user.is_admin || _user.role === 'master') {
    document.getElementById('syncSection').style.display = 'block';
  }
  await loadTipos();
  // Enhance tabela de resultados com sort nas colunas
  const t = document.querySelector('.tbl-wrap table');
  if (t) FATable.enhance(t, { sort: true, filter: false });
}

async function loadTipos() {
  try {
    const r = await fetch(API + '/tipos', { headers: H() });
    if (!r.ok) return;
    _tipos = await r.json();
    const sel = document.getElementById('search-tipo');
    sel.innerHTML = '<option value="">Todos os tipos</option>' +
      _tipos.map(t => `<option value="${t.tipo || t}">${t.tipo || t}${t.count ? ` (${t.count})` : ''}</option>`).join('');
  } catch {}
}

function onSearch() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(doSearch, 350);
}

async function doSearch() {
  const q = document.getElementById('search-q').value.trim();
  const tipo = document.getElementById('search-tipo').value;
  const tb = document.getElementById('results');
  if (q.length < 3 && !tipo) {
    tb.innerHTML = '<tr class="empty"><td colspan="5">Digite ao menos 3 caracteres para buscar.</td></tr>';
    return;
  }
  tb.innerHTML = '<tr><td colspan="5" class="fa-loading-row"><span class="fa-spinner"></span>Buscando fundos...</td></tr>';
  try {
    const params = new URLSearchParams();
    if (q) params.set('q', q);
    if (tipo) params.set('tipo', tipo);
    params.set('limit', '50');
    const list = await FAErr.fetchJson(API + '/buscar?' + params.toString(), { headers: H() });
    if (!list.length) {
      tb.innerHTML = '<tr class="empty"><td colspan="5">Nenhum fundo encontrado.</td></tr>';
      return;
    }
    tb.innerHTML = list.map(f => `
      <tr>
        <td class="cnpj">${f.cnpj || '—'}</td>
        <td style="font-weight:600">${f.denom_social || f.nome || '—'}</td>
        <td>${f.tipo || '—'}</td>
        <td style="color:var(--muted)">${f.classe || '—'}</td>
        <td style="font-family:monospace;color:var(--muted)">${f.vl_patrim_liq ? 'R$ ' + Number(f.vl_patrim_liq).toLocaleString('pt-BR',{maximumFractionDigits:0}) : '—'}</td>
      </tr>`).join('');
  } catch (e) {
    tb.innerHTML = `<tr class="empty"><td colspan="5">Erro: ${e.message}</td></tr>`;
  }
}

async function syncCadastro() {
  if (!await FAModal.confirm('Sincronizar cadastro de fundos da CVM? Pode demorar alguns minutos.')) return;
  const btn = document.getElementById('btn-sync-cad');
  const out = document.getElementById('sync-result');
  btn.disabled = true; btn.textContent = 'Sincronizando...';
  out.style.display = 'block'; out.className = 'sync-result'; out.textContent = 'Iniciando sync de cadastro...';
  try {
    const r = await fetch(API + '/sync/cadastro', { method: 'POST', headers: H() });
    if (!r.ok) {
      const data = await r.json().catch(() => ({}));
      throw new Error(data.detail || ('HTTP ' + r.status));
    }
    const data = await r.json();
    out.textContent = JSON.stringify(data, null, 2);
    toast('Sync de cadastro concluido.', 'ok');
    await loadTipos();
  } catch (e) {
    out.className = 'sync-result err';
    out.textContent = 'Falha: ' + e.message;
    toast('Falha no sync.', 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Sincronizar Cadastro';
  }
}

async function syncInforme() {
  const competencia = document.getElementById('sync-comp').value.trim();
  if (competencia && !/^\d{6}$/.test(competencia)) {
    toast('Competencia deve ser YYYYMM (6 digitos).', 'err');
    return;
  }
  if (!await FAModal.confirm(`Sincronizar informe diario${competencia ? ' (competencia ' + competencia + ')' : ' (mais recente)'}? Pode demorar.`)) return;
  const btn = document.getElementById('btn-sync-inf');
  const out = document.getElementById('sync-result');
  btn.disabled = true; btn.textContent = 'Sincronizando...';
  out.style.display = 'block'; out.className = 'sync-result'; out.textContent = 'Iniciando sync de informe diario...';
  try {
    const url = API + '/sync/informe' + (competencia ? '?competencia=' + encodeURIComponent(competencia) : '');
    const r = await fetch(url, { method: 'POST', headers: H() });
    if (!r.ok) {
      const data = await r.json().catch(() => ({}));
      throw new Error(data.detail || ('HTTP ' + r.status));
    }
    const data = await r.json();
    out.textContent = JSON.stringify(data, null, 2);
    toast('Sync de informe concluido.', 'ok');
  } catch (e) {
    out.className = 'sync-result err';
    out.textContent = 'Falha: ' + e.message;
    toast('Falha no sync.', 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Sincronizar Informe Diario';
  }
}

init();
</script>
</body>
</html>
