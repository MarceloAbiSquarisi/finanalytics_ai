<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Macro · FinAnalytics AI</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0A1628; --navy-mid:#0D2144; --navy-lgt:#112D5A;
  --blue:#3ABFF8; --blue-dk:#2E86C1;
  --gold:#F0B429; --gold-dk:#D4920A;
  --green:#2ED47A; --red:#E05555;
  --white:#E8F4FD; --muted:#6A9EBF;
  --border:rgba(58,191,248,.12); --card:rgba(13,33,68,.75);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--navy);color:var(--white);font-family:'Rajdhani',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(ellipse 70% 50% at 15% -5%,rgba(58,191,248,.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 110%,rgba(240,180,41,.05) 0%,transparent 55%),
    linear-gradient(rgba(58,191,248,.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(58,191,248,.022) 1px,transparent 1px);
  background-size:100% 100%,100% 100%,44px 44px,44px 44px}

/* ── Header ── */
.fa-header{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;
  padding:0 16px;height:48px;background:rgba(10,22,40,.92);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.fa-logo{font-size:15px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.fa-logo em{font-style:normal;color:var(--gold)}
.badge{font-size:8px;font-weight:800;letter-spacing:2px;
  background:linear-gradient(90deg,var(--gold),var(--gold-dk));
  color:var(--navy);padding:2px 5px;border-radius:3px;margin-left:3px}
.fa-nav{display:flex;align-items:center;gap:2px;overflow-x:auto;scrollbar-width:none;flex:1}
.fa-nav::-webkit-scrollbar{display:none}
.fa-nav a{white-space:nowrap;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:.4px;color:#8899aa;text-decoration:none;padding:5px 10px;
  border-radius:5px;transition:.15s}
.fa-nav a:hover{color:#00c48c;background:rgba(0,196,140,.08)}
.fa-nav a.active{color:#00c48c;background:rgba(0,196,140,.1)}
.pill{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Page ── */
.page{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:20px}
.page-title{font-size:24px;font-weight:700;color:var(--white);margin-bottom:4px;letter-spacing:.5px}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:20px;font-family:'DM Mono',monospace}

/* ── Snapshot cards ── */
.snap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.snap-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.snap-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--blue),transparent)}
.snap-card:hover{border-color:rgba(58,191,248,.3);transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.3)}
.snap-card.active{border-color:rgba(58,191,248,.4);background:rgba(58,191,248,.07)}
.snap-card.active::before{background:linear-gradient(90deg,var(--blue),var(--green))}
.snap-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.snap-value{font-size:22px;font-weight:700;color:var(--white);font-family:'DM Mono',monospace;line-height:1}
.snap-unit{font-size:10px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace}
.snap-change{font-size:11px;font-weight:600;margin-top:6px;font-family:'DM Mono',monospace}
.snap-change.up{color:var(--green)}
.snap-change.down{color:var(--red)}
.snap-date{font-size:9px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace}
.snap-skeleton{background:rgba(58,191,248,.05);border-radius:4px;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{opacity:.4}50%{opacity:.8}100%{opacity:.4}}

/* ── Chart section ── */
.chart-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.chart-title{font-size:16px;font-weight:700;letter-spacing:.3px}
.chart-meta{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.chart-controls{display:flex;gap:6px;flex-wrap:wrap}
.period-btn{background:rgba(58,191,248,.07);border:1px solid var(--border);color:var(--muted);
  font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:5px;cursor:pointer;transition:.15s}
.period-btn:hover{border-color:rgba(58,191,248,.3);color:var(--blue)}
.period-btn.active{background:rgba(58,191,248,.15);border-color:var(--blue);color:var(--blue)}
.chart-area{height:280px;border-radius:6px;overflow:hidden}

/* ── Comparison grid ── */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:768px){.cmp-grid{grid-template-columns:1fr}}
.cmp-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.cmp-title{font-size:12px;font-weight:600;letter-spacing:.5px;color:var(--muted);
  text-transform:uppercase;margin-bottom:12px}
.mini-chart{height:120px;border-radius:4px;overflow:hidden}

/* ── Stats bar ── */
.stats-bar{display:flex;gap:24px;flex-wrap:wrap;padding:12px 0;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:20px}
.stat-item{display:flex;flex-direction:column;gap:2px}
.stat-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.stat-val{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;color:var(--white)}

/* ── Status ── */
.status-bar{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;
  padding:8px 0;text-align:center}
.no-data{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.no-data p{margin-top:8px;font-size:11px;font-family:'DM Mono',monospace}
</style>
</head>
<body>

<header class="fa-header">
  <div class="fa-logo">Fin<em>Analytics</em> <span class="badge">AI</span></div>
  <nav class="fa-nav">
    <a href="/">Dashboard</a>
    <a href="/backtest">Backtest</a>
    <a href="/screener">Screener</a>
    <a href="/correlation">Correlação</a>
    <a href="/anomaly">Anomalias</a>
    <a href="/forecast">Forecast</a>
    <a href="/macro" class="active">Macro</a>
    <a href="/watchlist">Watchlist</a>
    <a href="/performance">Performance</a>
    <a href="/fixed-income">Renda Fixa</a>
    <a href="/etf">ETFs</a>
    <a href="/optimizer">Otimizador</a>
  </nav>
  <div class="pill"><span class="dot"></span>LIVE</div>
</header>

<div class="page">
  <div class="page-title">Painel Macroeconômico</div>
  <div class="page-sub" id="lastUpdate">Carregando dados...</div>

  <!-- Snapshot cards -->
  <div class="snap-grid" id="snapGrid">
    <!-- Skeletons enquanto carrega -->
    <div class="snap-card snap-skeleton" style="height:90px"></div>
    <div class="snap-card snap-skeleton" style="height:90px"></div>
    <div class="snap-card snap-skeleton" style="height:90px"></div>
    <div class="snap-card snap-skeleton" style="height:90px"></div>
    <div class="snap-card snap-skeleton" style="height:90px"></div>
    <div class="snap-card snap-skeleton" style="height:90px"></div>
  </div>

  <!-- Gráfico principal -->
  <div class="chart-section">
    <div class="chart-header">
      <div>
        <div class="chart-title" id="chartTitle">Selecione uma série</div>
        <div class="chart-meta" id="chartMeta"></div>
      </div>
      <div class="chart-controls">
        <button class="period-btn" onclick="setPeriod(90)">3M</button>
        <button class="period-btn active" onclick="setPeriod(365)">1A</button>
        <button class="period-btn" onclick="setPeriod(730)">2A</button>
        <button class="period-btn" onclick="setPeriod(1825)">5A</button>
        <button class="period-btn" onclick="setPeriod(99999)">MAX</button>
      </div>
    </div>
    <div id="statsBar" class="stats-bar" style="display:none"></div>
    <div class="chart-area" id="mainChart"></div>
    <div class="status-bar" id="statusBar">Clique em um card acima para visualizar a série</div>
  </div>

  <!-- Mini charts -->
  <div class="cmp-grid">
    <div class="cmp-card">
      <div class="cmp-title">SELIC vs IPCA</div>
      <div class="mini-chart" id="miniChart1"></div>
    </div>
    <div class="cmp-card">
      <div class="cmp-title">USD/BRL vs IBOV</div>
      <div class="mini-chart" id="miniChart2"></div>
    </div>
  </div>
</div>

<script>
(function authGuard(){var t=localStorage.getItem("access_token"),e=parseInt(localStorage.getItem("token_expires_at")||"0");if(!t||e<Date.now()+60000)window.location.replace("/login");})();
// ── Estado ─────────────────────────────────────────────────────────────────
let activeSeries = 'selic';
let activeChart = null;
let allData = {};
let periodDays = 365;

// ── Cores por série ────────────────────────────────────────────────────────
const COLORS = {
  selic:   '#3ABFF8',
  ipca:    '#F0B429',
  usd_brl: '#2ED47A',
  eur_brl: '#9B59B6',
  igpm:    '#E67E22',
  ibov:    '#00C48C',
  vix:     '#E05555',
  sp500:   '#F39C12',
};

// ── Utilitários ───────────────────────────────────────────────────────────
const fmt = (v, unit) => {
  if (unit === 'pts') return Number(v).toLocaleString('pt-BR', {maximumFractionDigits:0});
  if (unit === 'R$')  return 'R$ ' + Number(v).toFixed(4);
  return Number(v).toFixed(2) + '%';
};

function filterByPeriod(data, days) {
  if (!data || !data.length) return [];
  if (days >= 99999) return data;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  return data.filter(d => new Date(d.date) >= cutoff);
}

function calcStats(data) {
  if (!data.length) return {};
  const vals = data.map(d => d.value);
  return {
    min: Math.min(...vals),
    max: Math.max(...vals),
    avg: vals.reduce((a,b)=>a+b,0)/vals.length,
    first: vals[0],
    last: vals[vals.length-1],
  };
}

// ── Snapshot cards ─────────────────────────────────────────────────────────
async function loadSnapshot() {
  try {
    const r = await fetch('/api/v1/macro/snapshot');
    const json = await r.json();
    const snap = json.snapshot;
    const grid = document.getElementById('snapGrid');
    grid.innerHTML = '';

    const ORDER = ['selic','ipca','usd_brl','eur_brl','ibov','vix','sp500','igpm'];
    ORDER.forEach(key => {
      const s = snap[key];
      if (!s) {
        // Série ainda não coletada
        grid.innerHTML += `
          <div class="snap-card" onclick="loadSeries('${key}')">
            <div class="snap-label">${key.replace('_',' ').toUpperCase()}</div>
            <div class="snap-value" style="font-size:13px;color:var(--muted)">Coletando...</div>
            <div class="snap-unit">aguardando coleta</div>
          </div>`;
        return;
      }
      const up = s.change_pct >= 0;
      const arrow = up ? '▲' : '▼';
      grid.innerHTML += `
        <div class="snap-card${key===activeSeries?' active':''}" id="card-${key}" onclick="loadSeries('${key}')">
          <div class="snap-label">${s.label}</div>
          <div class="snap-value">${fmt(s.value, s.unit)}</div>
          <div class="snap-unit">${s.unit} · ${s.freq}</div>
          <div class="snap-change ${up?'up':'down'}">${arrow} ${Math.abs(s.change_pct).toFixed(2)}%</div>
          <div class="snap-date">${s.date}</div>
        </div>`;
    });

    const now = new Date().toLocaleString('pt-BR');
    document.getElementById('lastUpdate').textContent = `Última atualização: ${now} · Fonte: BCB + Yahoo Finance`;

  } catch(e) {
    document.getElementById('snapGrid').innerHTML =
      '<div class="no-data">Erro ao carregar snapshot<p>Verifique se a coleta macro foi iniciada</p></div>';
  }
}

// ── Gráfico principal ──────────────────────────────────────────────────────
function renderMainChart(series, data, meta) {
  const el = document.getElementById('mainChart');
  el.innerHTML = '';

  if (!data.length) {
    el.innerHTML = '<div class="no-data">Dados não disponíveis<p>Execute: POST /api/v1/storage/collect/macro</p></div>';
    return;
  }

  const filtered = filterByPeriod(data, periodDays);
  if (!filtered.length) { el.innerHTML = '<div class="no-data">Sem dados no período</div>'; return; }

  const chart = LightweightCharts.createChart(el, {
    layout: { background: { color: 'transparent' }, textColor: '#6A9EBF' },
    grid: { vertLines: { color: 'rgba(58,191,248,.06)' }, horzLines: { color: 'rgba(58,191,248,.06)' } },
    rightPriceScale: { borderColor: 'rgba(58,191,248,.12)' },
    timeScale: { borderColor: 'rgba(58,191,248,.12)', timeVisible: true },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    handleScroll: true,
    handleScale: true,
  });

  const color = COLORS[series] || '#3ABFF8';
  const line = chart.addLineSeries({
    color,
    lineWidth: 2,
    priceLineVisible: true,
    lastValueVisible: true,
    crosshairMarkerVisible: true,
  });

  const chartData = filtered.map(d => ({
    time: d.date,
    value: d.value,
  }));
  line.setData(chartData);
  chart.timeScale().fitContent();
  if (activeChart) activeChart.remove();
  activeChart = chart;

  // Stats bar
  const stats = calcStats(filtered);
  const unit = meta.unit;
  document.getElementById('statsBar').style.display = 'flex';
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item"><div class="stat-lbl">Atual</div><div class="stat-val">${fmt(stats.last,unit)}</div></div>
    <div class="stat-item"><div class="stat-lbl">Mínimo</div><div class="stat-val">${fmt(stats.min,unit)}</div></div>
    <div class="stat-item"><div class="stat-lbl">Máximo</div><div class="stat-val">${fmt(stats.max,unit)}</div></div>
    <div class="stat-item"><div class="stat-lbl">Média</div><div class="stat-val">${fmt(stats.avg,unit)}</div></div>
    <div class="stat-item"><div class="stat-lbl">Variação</div>
      <div class="stat-val" style="color:${stats.last>=stats.first?'var(--green)':'var(--red)'}">
        ${stats.first ? ((stats.last-stats.first)/Math.abs(stats.first)*100).toFixed(1)+'%' : '--'}
      </div>
    </div>
    <div class="stat-item"><div class="stat-lbl">Pontos</div><div class="stat-val">${filtered.length}</div></div>
  `;

  document.getElementById('statusBar').textContent =
    `${meta.label} · ${filtered.length} pontos · Fonte: ${meta.source}`;
}

// ── Mini charts ────────────────────────────────────────────────────────────
function renderMiniChart(elId, data1, color1, data2, color2) {
  const el = document.getElementById(elId);
  el.innerHTML = '';
  if (!data1.length && !data2.length) {
    el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted);font-size:11px">Coletando dados...</div>';
    return;
  }

  const chart = LightweightCharts.createChart(el, {
    layout: { background: { color: 'transparent' }, textColor: '#6A9EBF' },
    grid: { vertLines: { color: 'rgba(58,191,248,.04)' }, horzLines: { color: 'rgba(58,191,248,.04)' } },
    rightPriceScale: { visible: false },
    leftPriceScale: { visible: false },
    timeScale: { visible: false },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    handleScroll: false,
    handleScale: false,
  });

  if (data1.length) {
    // Normalizar para % do primeiro valor
    const base1 = data1[0].value;
    const line1 = chart.addLineSeries({ color: color1, lineWidth: 1.5, priceLineVisible: false, lastValueVisible: false });
    line1.setData(filterByPeriod(data1, 365).map(d => ({ time: d.date, value: (d.value/base1-1)*100 })));
  }
  if (data2.length) {
    const base2 = data2[0].value;
    const line2 = chart.addLineSeries({ color: color2, lineWidth: 1.5, priceLineVisible: false, lastValueVisible: false });
    line2.setData(filterByPeriod(data2, 365).map(d => ({ time: d.date, value: (d.value/base2-1)*100 })));
  }
  chart.timeScale().fitContent();
}

// ── Carregar série ─────────────────────────────────────────────────────────
async function loadSeries(series) {
  activeSeries = series;

  // Destacar card ativo
  document.querySelectorAll('.snap-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + series);
  if (card) card.classList.add('active');

  document.getElementById('chartTitle').textContent = 'Carregando...';
  document.getElementById('chartMeta').textContent = '';

  try {
    let data, meta;
    if (allData[series]) {
      data = allData[series].data;
      meta = allData[series];
    } else {
      const r = await fetch(`/api/v1/macro/${series}?limit=2000`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const json = await r.json();
      allData[series] = json;
      data = json.data || [];
      meta = json;
    }

    document.getElementById('chartTitle').textContent = (meta && meta.label) || series.toUpperCase();
    document.getElementById('chartMeta').textContent = meta
      ? `${meta.unit||''} · ${meta.freq||''} · ${meta.source||''} · ${meta.count||0} pontos`
      : 'Sem dados';

    renderMainChart(series, data || [], meta || {unit:'',freq:'',source:''});

  } catch(e) {
    document.getElementById('chartTitle').textContent = 'Erro ao carregar dados';
    document.getElementById('statusBar').textContent = e.message;
  }
}

function setPeriod(days) {
  periodDays = days;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (activeSeries && allData[activeSeries]) {
    renderMainChart(activeSeries, allData[activeSeries].data, allData[activeSeries]);
  }
}

// ── Mini charts com múltiplas séries ──────────────────────────────────────
async function loadMiniCharts() {
  const load = async (s) => {
    if (allData[s]) return allData[s].data;
    try {
      const r = await fetch(`/api/v1/macro/${s}?limit=500`);
      const json = await r.json();
      allData[s] = json;
      return json.data || [];
    } catch { return []; }
  };

  const [selic, ipca, usd, ibov] = await Promise.all([
    load('selic'), load('ipca'), load('usd_brl'), load('ibov')
  ]);

  renderMiniChart('miniChart1', selic, COLORS.selic, ipca, COLORS.ipca);
  renderMiniChart('miniChart2', usd, COLORS.usd_brl, ibov, COLORS.ibov);
}

// ── Init ───────────────────────────────────────────────────────────────────
(async () => {
  await loadSnapshot();
  // Só auto-carrega se já há arquivos macro coletados
  try {
    const r = await fetch('/api/v1/macro/selic?limit=5');
    const j = await r.json();
    if (j.count > 0) {
      await loadSeries('selic');
    } else {
      document.getElementById('chartTitle').textContent = 'Aguardando coleta macro';
      document.getElementById('statusBar').textContent =
        'Execute: POST /api/v1/storage/collect/macro · Os dados aparecerão automaticamente';
    }
  } catch(e) {
    document.getElementById('chartTitle').textContent = 'Aguardando coleta macro';
  }
  await loadMiniCharts();
})();
</script>
</body>
</html>
