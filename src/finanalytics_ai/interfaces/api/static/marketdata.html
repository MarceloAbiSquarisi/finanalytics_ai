<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Market Data — FinAnalytics</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0c10;--panel:#0f1218;--border:#1c2130;--text:#e2e8f0;--muted:#4a5568;--mono:'JetBrains Mono','Fira Code',monospace;--green:#00e676;--red:#ff4444;--yellow:#ffd740;--accent:#6c63ff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{display:flex;align-items:center;gap:16px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0}
.header h1{font-size:13px;font-weight:700;letter-spacing:2px}
.badge{background:var(--accent);color:#fff;font-size:9px;padding:2px 6px;border-radius:2px;font-weight:700;letter-spacing:1px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
.dot.live{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.stext{font-size:10px;color:var(--muted)}
.hright{margin-left:auto;display:flex;align-items:center;gap:12px}
.rbtn{background:var(--border);border:1px solid var(--muted);color:var(--text);padding:4px 10px;border-radius:3px;cursor:pointer;font-family:var(--mono);font-size:11px}
.rbtn:hover{border-color:var(--accent);color:var(--accent)}
.main{display:grid;grid-template-columns:340px 1fr;flex:1;overflow:hidden;gap:1px;background:var(--border)}
.lcol,.rcol{display:flex;flex-direction:column;gap:1px;background:var(--border);overflow:hidden}
.panel{background:var(--panel);overflow:hidden;display:flex;flex-direction:column}
.ph{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.pt{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
.pb{flex:1;overflow:hidden}
#quote-board{height:200px;overflow-y:auto}
.qrow{display:grid;grid-template-columns:70px 80px 60px 60px 70px;align-items:center;padding:5px 12px;border-bottom:1px solid #111827;cursor:pointer;transition:background .1s}
.qrow:hover{background:#141824}
.qrow.sel{background:#1a1f2e;border-left:2px solid var(--accent)}
.qp{font-size:13px;font-weight:700;text-align:right}
.qc{font-size:11px;text-align:right}
.qv,.qt{font-size:10px;color:var(--muted);text-align:right}
.up{color:var(--green)}.dn{color:var(--red)}.fl{color:var(--muted)}
#tick-stream{height:180px;overflow-y:auto}
.trow{display:grid;grid-template-columns:60px 80px 50px 60px;padding:3px 12px;border-bottom:1px solid #0d1117;font-size:11px;animation:fi .2s}
@keyframes fi{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:none}}
.tt{color:var(--muted)}.tp{font-weight:700}.tq{color:var(--muted);text-align:right}.ts2{font-size:10px;text-align:right}
#chart-container{flex:1;min-height:0}
.ctbar{display:flex;gap:2px}
.rb{background:transparent;border:1px solid var(--border);color:var(--muted);padding:2px 8px;border-radius:2px;cursor:pointer;font-family:var(--mono);font-size:10px}
.rb.act,.rb:hover{border-color:var(--accent);color:var(--accent)}
#vbar{display:flex;align-items:center;gap:8px;padding:6px 12px;flex-shrink:0;border-top:1px solid var(--border);font-size:11px}
.vi{display:flex;gap:4px}.vl{color:var(--muted)}.vv{color:var(--text);font-weight:700}
#adx-panel{background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;display:none}
.adxh{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;border-bottom:1px solid var(--border)}
.adxn{display:flex;gap:16px;font-size:11px}
.adxi{display:flex;gap:4px}.adxl{color:var(--muted)}.adxv{font-weight:700}
.adxv.y{color:var(--yellow)}.adxv.g{color:var(--green)}.adxv.r{color:var(--red)}
.trend{font-size:10px;padding:2px 8px;border-radius:2px;font-weight:700;letter-spacing:1px}
.t-alta{background:#0d2b1a;color:var(--green);border:1px solid var(--green)}
.t-baixa{background:#1f0d0d;color:var(--red);border:1px solid var(--red)}
.t-lateral{background:#1a1a0d;color:var(--yellow);border:1px solid var(--yellow)}
.t-forte{background:#1a0d2b;color:var(--accent);border:1px solid var(--accent)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div class="header">
  <h1>MARKET DATA</h1>
  <span class="badge">LIVE</span>
  <div class="dot" id="sdot"></div>
  <span class="stext" id="stxt">Conectando...</span>
  <div class="hright">
    <span class="stext" id="tctr">ticks: —</span>
    <button class="rbtn" onclick="loadQuotes()">↻ REFRESH</button>
  </div>
</div>

<div class="main">
  <div class="lcol">
    <div class="panel" style="flex:0 0 auto">
      <div class="ph">
        <span class="pt">QUOTE BOARD</span>
        <span class="stext" id="qtime">—</span>
      </div>
      <div class="pb">
        <div class="qrow" style="background:#0d1117;font-size:10px;color:var(--muted)">
          <span>TICKER</span><span style="text-align:right">ÚLTIMO</span><span style="text-align:right">VAR%</span><span style="text-align:right">VOL</span><span style="text-align:right">TRADES</span>
        </div>
        <div id="quote-board"></div>
      </div>
    </div>
    <div class="panel" style="flex:1">
      <div class="ph">
        <span class="pt">TIME &amp; TRADES — <span id="sticker">—</span></span>
      </div>
      <div class="pb"><div id="tick-stream"></div></div>
    </div>
  </div>

  <div class="rcol">
    <div class="panel" style="flex:1">
      <div class="ph">
        <span class="pt">CANDLES — <span id="cticker">SELECIONE UM TICKER</span></span>
        <div class="ctbar">
          <button class="rb act" onclick="setRes('1m',this)">1M</button>
          <button class="rb" onclick="setRes('5m',this)">5M</button>
          <button class="rb" onclick="setRes('15m',this)">15M</button>
          <button class="rb" onclick="setRes('1h',this)">1H</button>
        </div>
      </div>
      <div class="pb" id="chart-container"></div>
      <div id="adx-panel">
        <div class="adxh">
          <span class="pt">ADX / DI+ / DI-</span>
          <div class="adxn">
            <div class="adxi"><span class="adxl">ADX</span><span class="adxv y" id="adx-v">—</span></div>
            <div class="adxi"><span class="adxl">DI+</span><span class="adxv g" id="dip-v">—</span></div>
            <div class="adxi"><span class="adxl">DI-</span><span class="adxv r" id="din-v">—</span></div>
            <div class="adxi"><span class="adxl">TENDÊNCIA</span><span class="trend t-lateral" id="trend-v">LATERAL</span></div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="stext">Período</span>
            <select id="adx-per" onchange="refreshADX()" style="background:var(--border);border:1px solid var(--muted);color:var(--text);padding:2px 4px;font-family:var(--mono);font-size:10px;border-radius:2px">
              <option value="7">7</option><option value="14" selected>14</option><option value="21">21</option>
            </select>
          </div>
        </div>
        <div style="height:100px;padding:4px 8px"><canvas id="adx-canvas"></canvas></div>
      </div>
      <div id="vbar">
        <div class="vi"><span class="vl">OPEN</span><span class="vv" id="v-o">—</span></div>
        <div class="vi"><span class="vl">HIGH</span><span class="vv up" id="v-h">—</span></div>
        <div class="vi"><span class="vl">LOW</span><span class="vv dn" id="v-l">—</span></div>
        <div class="vi"><span class="vl">CLOSE</span><span class="vv" id="v-c">—</span></div>
        <div class="vi"><span class="vl">VOL</span><span class="vv" id="v-vol">—</span></div>
        <div class="vi"><span class="vl">VWAP</span><span class="vv" id="v-vwap">—</span></div>
        <div class="vi"><span class="vl">TRADES</span><span class="vv" id="v-tr">—</span></div>
      </div>
    </div>
  </div>
</div>

<script>
var API = '/api/v1/marketdata';
var sel = null, res = '1m', chart = null, cs = null, vs = null;

function fp(v){return v!=null?Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):'—'}
function fv(v){if(v==null)return '—';v=Number(v);if(v>=1e9)return (v/1e9).toFixed(1)+'B';if(v>=1e6)return (v/1e6).toFixed(1)+'M';if(v>=1e3)return (v/1e3).toFixed(0)+'K';return v.toFixed(0)}
function ft(ts){if(!ts)return '—';return new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}

function initChart(){
  var c=document.getElementById('chart-container');
  chart=LightweightCharts.createChart(c,{
    layout:{background:{color:'#0f1218'},textColor:'#4a5568'},
    grid:{vertLines:{color:'#1c2130'},horzLines:{color:'#1c2130'}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    rightPriceScale:{borderColor:'#1c2130'},
    timeScale:{borderColor:'#1c2130',timeVisible:true,secondsVisible:false},
    width:c.clientWidth,height:c.clientHeight
  });
  cs=chart.addCandlestickSeries({upColor:'#00e676',downColor:'#ff4444',borderUpColor:'#00e676',borderDownColor:'#ff4444',wickUpColor:'#00e676',wickDownColor:'#ff4444'});
  vs=chart.addHistogramSeries({color:'#6c63ff33',priceFormat:{type:'volume'},priceScaleId:'vol'});
  chart.priceScale('vol').applyOptions({scaleMargins:{top:0.8,bottom:0}});
  new ResizeObserver(function(){chart.applyOptions({width:c.clientWidth,height:c.clientHeight})}).observe(c);
}

async function loadQuotes(){
  try{
    var r=await fetch(API+'/quotes'),d=await r.json();
    if(!r.ok)return;
    document.getElementById('quote-board').innerHTML=(d.quotes||[]).map(function(q){
      var chg=Number(q.change_pct||0),cls=chg>0?'up':chg<0?'dn':'fl',s=q.ticker===sel?'sel':'';
      return '<div class="qrow '+s+'" onclick="selTicker(\''+q.ticker+'\')">'+
        '<span style="font-weight:700">'+q.ticker+'</span>'+
        '<span class="qp '+cls+'">'+fp(q.price)+'</span>'+
        '<span class="qc '+cls+'">'+(chg>=0?'+':'')+chg.toFixed(2)+'%</span>'+
        '<span class="qv">'+fv(q.volume_day)+'</span>'+
        '<span class="qt">'+fv(q.trades_day)+'</span>'+
        '</div>';
    }).join('');
    document.getElementById('qtime').textContent=new Date().toLocaleTimeString('pt-BR');
  }catch(e){}
}

function selTicker(t){
  sel=t;
  document.getElementById('sticker').textContent=t;
  document.getElementById('cticker').textContent=t;
  loadQuotes();loadCandles();loadTicks();loadVolume();
}

function setRes(r,btn){
  res=r;
  document.querySelectorAll('.rb').forEach(function(b){b.classList.remove('act')});
  btn.classList.add('act');
  if(sel)loadCandles();
}

async function loadCandles(){
  if(!sel)return;
  try{
    var r=await fetch(API+'/candles/'+sel+'?resolution='+res+'&limit=200'),d=await r.json();
    if(!r.ok||!d.candles)return;
    cs.setData(d.candles.map(function(c){return{time:Math.floor(new Date(c.ts).getTime()/1000),open:Number(c.open),high:Number(c.high),low:Number(c.low),close:Number(c.close)}}));
    vs.setData(d.candles.map(function(c){return{time:Math.floor(new Date(c.ts).getTime()/1000),value:Number(c.volume||0),color:Number(c.close)>=Number(c.open)?'#00e67633':'#ff444433'}}));
    if(d.candles.length>15){
      _adxBars=d.candles.map(function(c){return{time:new Date(c.ts).getTime()/1000,open:Number(c.open),high:Number(c.high),low:Number(c.low),close:Number(c.close)}});
      refreshADX();
    }
  }catch(e){}
}

async function loadTicks(){
  if(!sel)return;
  try{
    var r=await fetch(API+'/ticks/'+sel+'?limit=60'),d=await r.json();
    if(!r.ok||!d.ticks)return;
    document.getElementById('tick-stream').innerHTML=d.ticks.slice(-50).reverse().map(function(t){
      var side=t.buy_agent>t.sell_agent?'<span class="up">C</span>':'<span class="dn">V</span>';
      return '<div class="trow"><span class="tt">'+ft(t.time)+'</span><span class="tp">'+fp(t.price)+'</span><span class="tq">'+t.quantity+'</span><span class="ts2">'+side+'</span></div>';
    }).join('');
  }catch(e){}
}

async function loadVolume(){
  if(!sel)return;
  try{
    var r=await fetch(API+'/volume/'+sel),d=await r.json();
    if(!r.ok)return;
    document.getElementById('v-o').textContent=fp(d.open);
    document.getElementById('v-h').textContent=fp(d.high);
    document.getElementById('v-l').textContent=fp(d.low);
    document.getElementById('v-c').textContent=fp(d.close);
    document.getElementById('v-vol').textContent=fv(d.total_volume);
    document.getElementById('v-vwap').textContent=fp(d.vwap);
    document.getElementById('v-tr').textContent=fv(d.trades);
  }catch(e){}
}

async function loadStatus(){
  try{
    var r=await fetch(API+'/status'),d=await r.json();
    if(!r.ok)return;
    var dot=document.getElementById('sdot'),txt=document.getElementById('stxt'),ctr=document.getElementById('tctr');
    if(d.market_connected===true||d.market_connected==='True'||d.market_connected==1){
      dot.className='dot live';txt.textContent='CONECTADO';
    }else{
      dot.className='dot';txt.textContent=d.is_connected?'LOGIN OK':'OFFLINE';
    }
    if(d.total_ticks)ctr.textContent='ticks: '+Number(d.total_ticks).toLocaleString('pt-BR');
  }catch(e){document.getElementById('stxt').textContent='agent offline'}
}

// ADX
var _adxBars=[];
function calcADX(bars,p){
  p=p||14;var n=bars.length;if(n<p+1)return null;
  var tr=[],pdm=[],ndm=[];
  for(var i=1;i<n;i++){
    var h=bars[i].high,l=bars[i].low,pc=bars[i-1].close;
    tr.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));
    var u=h-bars[i-1].high,dn=bars[i-1].low-l;
    pdm.push(u>dn&&u>0?u:0);ndm.push(dn>u&&dn>0?dn:0);
  }
  function wilder(a,p){var o=new Array(a.length).fill(null),s=0;for(var i=0;i<p;i++)s+=a[i];o[p-1]=s;for(var i=p;i<a.length;i++)o[i]=o[i-1]-o[i-1]/p+a[i];return o}
  var atr=wilder(tr,p),sp=wilder(pdm,p),sn=wilder(ndm,p);
  var diP=[],diN=[],dx=[];
  for(var i=0;i<tr.length;i++){
    if(atr[i]===null){diP.push(null);diN.push(null);dx.push(null);continue}
    var dp=atr[i]>0?100*sp[i]/atr[i]:0,dn2=atr[i]>0?100*sn[i]/atr[i]:0;
    diP.push(dp);diN.push(dn2);dx.push((dp+dn2)>0?100*Math.abs(dp-dn2)/(dp+dn2):0);
  }
  var adxS=wilder(dx.filter(function(v){return v!==null}),p),adx=new Array(dx.length).fill(null),j=0;
  for(var i=0;i<dx.length;i++){if(dx[i]!==null)adx[i]=adxS[j++]}
  return{diP:diP,diN:diN,adx:adx};
}

function refreshADX(){
  if(_adxBars.length<15)return;
  var p=parseInt(document.getElementById('adx-per').value),res=calcADX(_adxBars,p);
  if(!res)return;
  var last=function(a){for(var i=a.length-1;i>=0;i--)if(a[i]!==null)return a[i];return null};
  var adv=last(res.adx),dp=last(res.diP),dn=last(res.diN);
  document.getElementById('adx-v').textContent=adv!==null?adv.toFixed(1):'—';
  document.getElementById('dip-v').textContent=dp!==null?dp.toFixed(1):'—';
  document.getElementById('din-v').textContent=dn!==null?dn.toFixed(1):'—';
  var trend='LATERAL',cls='t-lateral';
  if(adv!==null){if(adv>=25&&dp>dn){trend='ALTA';cls='t-alta'}else if(adv>=25&&dn>dp){trend='BAIXA';cls='t-baixa'}else if(adv>=40){trend='FORTE';cls='t-forte'}}
  var tEl=document.getElementById('trend-v');tEl.textContent=trend;tEl.className='trend '+cls;
  document.getElementById('adx-panel').style.display='block';
  var labels=_adxBars.map(function(b){return new Date(b.time*1000).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})});
  var can=document.getElementById('adx-canvas');
  if(can._c)can._c.destroy();
  can._c=new Chart(can,{type:'line',data:{labels:labels,datasets:[
    {label:'ADX',data:res.adx,borderColor:'#ffd740',borderWidth:1.5,pointRadius:0,tension:0.1},
    {label:'DI+',data:res.diP,borderColor:'#00e676',borderWidth:1,pointRadius:0,tension:0.1},
    {label:'DI-',data:res.diN,borderColor:'#ff4444',borderWidth:1,pointRadius:0,tension:0.1}
  ]},options:{animation:false,responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{color:'#7a95b0',font:{size:10},boxWidth:20,padding:8}}},scales:{x:{ticks:{color:'#4a5568',font:{size:9},maxTicksLimit:8,maxRotation:0},grid:{color:'#1c2130'}},y:{min:0,max:60,ticks:{color:'#4a5568',font:{size:9},stepSize:20},grid:{color:'#1c2130'}}}}});
}

// Init
initChart();
loadQuotes();
loadStatus();
setInterval(loadQuotes,3000);
setInterval(loadStatus,5000);
setInterval(function(){if(sel){loadTicks();loadCandles()}},5000);
setInterval(function(){if(sel)loadVolume()},10000);
setTimeout(async function(){
  var r=await fetch(API+'/quotes'),d=await r.json();
  if(d.quotes&&d.quotes.length>0)selTicker(d.quotes[0].ticker);
},800);
</script>
</body>
</html>
