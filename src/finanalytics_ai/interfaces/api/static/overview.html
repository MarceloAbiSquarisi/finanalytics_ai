<style>
.ov-toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.ov-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.ov-tab {
  background: transparent; border: 1px solid var(--border, #1c2535); color: var(--muted, #4a6a8a);
  padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: 'DM Mono', monospace;
  transition: all .15s;
}
.ov-tab:hover { color: var(--accent, #00d4ff); border-color: var(--accent, #00d4ff); }
.ov-tab.active { background: rgba(58,191,248,.15); color: var(--accent, #00d4ff); border-color: var(--accent, #00d4ff); }
.ov-tab .ov-tab-count { font-size: 10px; opacity: .7; margin-left: 4px; }
.ov-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.ov-controls select, .ov-controls input {
  background: var(--card, #0e1a2e); border: 1px solid var(--border, #1c2535); color: var(--text);
  padding: 6px 10px; border-radius: 5px; font-family: 'DM Mono', monospace; font-size: 12px;
}
.ov-meta { font-size: 11px; color: var(--muted, #4a6a8a); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.ov-refresh-btn {

}

.ov-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}
.ov-grid.compact {
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));

}
.ov-card {

}

.ov-grid.compact .ov-ticker { font-size: 13px; letter-spacing: .3px }

.ov-ticker { font-size: 17px; font-weight: 800; letter-spacing: .5px; color: var(--accent, #00d4ff); font-family: 'DM Mono', monospace; }

.ov-tag.tag-watch  { color: var(--gold, #F0B429); border-color: rgba(240,180,41,.3); }

.ov-chg.down  { color: var(--red, #ff3d5a); }
.ov-chg.flat  { color: var(--muted, #4a6a8a); }
.ov-spark {

.ov-spark path.fill.down { fill: rgba(255,61,90,.10); }

.ov-foot { display: flex; justify-content: space-between; align-items: center; gap: 6px; font-size: 10px; color: var(--muted, #4a6a8a); }

  font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 700;

.ov-ml.buy   { color: var(--green, #00e676); border-color: rgba(0,230,118,.4); background: rgba(0,230,118,.10); }
.ov-ml.sell  { color: var(--red, #ff3d5a);   border-color: rgba(255,61,90,.4); background: rgba(255,61,90,.10); }

.ov-ml-pct { margin-left: 4px; opacity: .8; font-weight: 500; }

}
.ov-ml-recalc:hover { background: rgba(58,191,248,.3); }

.ov-pnl { font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace; margin-top: 2px; }
.ov-pnl.up    { color: var(--green, #00e676); }
.ov-pnl.down  { color: var(--red, #ff3d5a); }

.ov-sl {

.ov-empty { padding: 60px 20px; text-align: center; color: var(--muted, #4a6a8a); }
.ov-skeleton { background: linear-gradient(90deg, rgba(255,255,255,.04), rgba(255,255,255,.10), rgba(255,255,255,.04)); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.ov-card-loading { opacity: .55; pointer-events: none; }

<script>
'use strict';

const REFRESH_MS = 30000;
const SPARK_BARS = 30;
const SPARK_RES = '1d';

let _allItems = [];           // [{ticker, source, qty?, avg?, ...}]
let _quotes = {};             // ticker → {last, prev, closes}
let _signals = {};            // ticker → {signal, predicted_return_pct, snapshot_date, ...}
let _signalsSnapshot = null;  // ISO date do snapshot mais recente
let _stopLoss = {};           // ticker → {stop_price, qty, count} (active stop-limit orders no profit_agent)
let _accountsMap = {};        // id → {apelido, institution_name} (pra rotular tx em "Últimas movs")
let _density = localStorage.getItem('ov_density') || 'compact';  // 'compact' | 'detail'
let _activeTab = 'all';
let _activeSort = 'ticker';
let _activeMlFilter = 'all';
let _searchQ = '';
let _refreshInterval = null;

function $(id) { return document.getElementById(id); }
function f2(n) { return (n == null || isNaN(n)) ? '—' : (+n).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function tok() { return localStorage.getItem('access_token'); }
async function authFetch(url) {
  return fetch(url, { headers: { Authorization: 'Bearer ' + tok() } }).then(r => r.ok ? r.json() : Promise.reject(new Error(url + ' → ' + r.status)));
}

function buildSparkline(closes, w, h) {
  if (!closes || closes.length < 2) return '';
  const n = closes.length;
  const min = Math.min(...closes), max = Math.max(...closes);
  const range = max - min || 1;
  const stepX = w / (n - 1);
  const pts = closes.map((c, i) => [(i * stepX).toFixed(1), (h - ((c - min) / range) * h).toFixed(1)]);
  const linePath = 'M ' + pts.map(p => p[0] + ',' + p[1]).join(' L ');
  const fillPath = linePath + ` L ${w},${h} L 0,${h} Z`;
  const dir = closes[n - 1] > closes[0] ? 'up' : (closes[n - 1] < closes[0] ? 'down' : 'flat');
  return `<svg class="ov-spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path class="fill ${dir}" d="${fillPath}"/>
    <path class="line ${dir}" d="${linePath}" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// ── DATA SOURCES ─────────────────────────────────────────────────────────
async function fetchPositions() {
  try {
    const data = await authFetch('/api/v1/wallet/positions');
    const arr = Array.isArray(data) ? data : (data.positions || []);
    return arr.map(p => ({
      ticker: p.ticker, source: 'position', qty: p.quantity, avg: p.average_price, value: (p.quantity || 0) * (p.average_price || 0),
    }));
  } catch (e) { console.warn('positions fail:', e.message); return []; }
}
async function fetchWatchlist() {
  try {
    const data = await authFetch('/api/v1/watchlist');
    const items = Array.isArray(data) ? data : (data.items || data.tickers || []);
    const tickers = items.map(it => typeof it === 'string' ? it : (it.ticker || it.symbol)).filter(Boolean);
    const dedup = [...new Set(tickers)];
    return dedup.map(t => ({ ticker: t, source: 'watchlist' }));
  } catch (e) { console.warn('watchlist fail:', e.message); return []; }
}
async function fetchCrypto() {
  try {
    const data = await authFetch('/api/v1/wallet/crypto');
    const arr = Array.isArray(data) ? data : [];
    return arr.map(c => ({
      ticker: c.symbol || c.ticker, source: 'crypto', qty: c.quantity, avg: c.average_price_brl,
      value: (c.quantity || 0) * (c.average_price_brl || 0),
    }));
  } catch (e) { console.warn('crypto fail:', e.message); return []; }
}
async function fetchRF() {
  // RF holdings precisam portfolio_id; pegamos todos portfolios e iteramos.
  try {
    const portfolios = await authFetch('/api/v1/portfolios');
    const arr = Array.isArray(portfolios) ? portfolios : [];
    const all = [];
    for (const p of arr) {
      try {
        const det = await authFetch(`/api/v1/fixed-income/portfolio/${p.portfolio_id}`);
        const holdings = det.holdings || [];
        holdings.forEach(h => all.push({
          ticker: h.bond_id || h.bond_name || '?', source: 'rf', qty: 1, avg: h.invested,
          value: h.invested || 0, bond_name: h.bond_name, indexer: h.indexer,
        }));
      } catch (e2) { /* skip */ }
    }
    return all;
  } catch (e) { console.warn('rf fail:', e.message); return []; }
}

async function fetchRecentTransactions() {
  try {
    const data = await authFetch('/api/v1/wallet/transactions?limit=5');
    return Array.isArray(data) ? data : [];
  } catch (e) { console.warn('recent_tx fail:', e.message); return []; }
}

async function fetchAccountsCache() {
  try {
    const data = await authFetch('/api/v1/wallet/accounts');
    if (Array.isArray(data)) {
      _accountsMap = {};
      data.forEach(a => { _accountsMap[a.id] = { apelido: a.apelido, institution_name: a.institution_name, titular: a.titular }; });
    }
  } catch (e) { console.warn('accounts cache fail:', e.message); }
}

function renderRecentTransactions(tx) {
  const el = $('ov-recent-list');
  if (!tx.length) { el.innerHTML = '<em style="color:var(--muted)">Nenhuma movimentação recente.</em>'; return; }
  el.innerHTML = tx.slice(0, 5).map(t => {
    const dt = (t.reference_date || t.created_at || '').slice(0, 10);
    const amt = parseFloat(t.amount) || 0;
    const sign = amt >= 0 ? '+' : '';
    const color = amt > 0 ? 'var(--green,#5fd99a)' : (amt < 0 ? 'var(--red,#e05555)' : 'var(--muted)');
    const stColor = t.status === 'pending' ? 'var(--gold,#F0B429)' : 'var(--white,#fff)';
    const acc = _accountsMap[t.account_id];
    const accLbl = acc ? (acc.apelido || acc.titular || acc.institution_name || t.account_id.slice(0, 8)) : (t.account_id ? t.account_id.slice(0, 8) : '—');
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--white,#fff)">${dt}</span>
      <span style="flex:1;margin:0 12px;color:var(--white,#fff)"><strong>${t.ticker || '—'}</strong> · ${t.tx_type || '—'}</span>
      <span style="font-size:11px;color:var(--white,#fff);margin-right:10px;min-width:120px;text-align:right">${accLbl}</span>
      <span style="font-family:'DM Mono',monospace;color:${color};font-weight:600">${sign}R$ ${f2(amt)}</span>
      <span style="margin-left:10px;font-size:10px;color:${stColor};text-transform:uppercase">${t.status || '—'}</span>
    </div>`;
  }).join('');
}

async function fetchSparkline(ticker) {
  try {
    const r = await fetch(`/api/v1/marketdata/candles/${ticker}?resolution=${SPARK_RES}&limit=${SPARK_BARS}`);
    if (!r.ok) return { closes: [], last: null, prev: null };
    const d = await r.json();
    const candles = d.candles || [];
    const closes = candles.map(c => +c.close);
    return {
      closes,
      last: closes.length ? closes[closes.length - 1] : null,
      prev: closes.length > 1 ? closes[closes.length - 2] : null,
    };
  } catch (e) { return { closes: [], last: null, prev: null }; }
}

async function fetchAllSignals(timeoutMs = 8000) {
  // Lê o último snapshot diário (signal_history) — query SELECT, retorna em <100ms.
  // limit=500 cobre os ~120 tickers calibrados do snapshot mais recente.
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), timeoutMs);
    const r = await fetch('/api/v1/ml/signal_history?limit=500', { headers: { Authorization: 'Bearer ' + tok() }, signal: ctrl.signal });
    clearTimeout(tid);
    if (!r.ok) return { map: {}, snapshot: null };
    const items = await r.json();
    if (!Array.isArray(items) || items.length === 0) return { map: {}, snapshot: null };
    // Items vêm ordenados por snapshot_date DESC, ticker — primeiro de cada ticker = mais recente.
    const map = {};
    let snapshot = null;
    items.forEach(it => {
      if (!(it.ticker in map)) {
        map[it.ticker] = it;
        if (!snapshot || it.snapshot_date > snapshot) snapshot = it.snapshot_date;
      }
    });
    return { map, snapshot };
  } catch (e) { console.warn('signal_history fail:', e.message); return { map: {}, snapshot: null }; }
}

async function fetchStopLossOrders() {
  // Lê ordens ativas no profit_agent. Filtra stop-limit (order_type=4) com status pendente.
  // status: 0=New, 1=PartialFilled, 10=PendingNew → ativos
  try {
    const r = await fetch('/api/v1/agent/orders', { headers: { Authorization: 'Bearer ' + tok() } });
    if (!r.ok) return {};
    const data = await r.json();
    const orders = data.orders || [];
    const map = {};
    orders.forEach(o => {
      if (o.order_type !== 4) return;                     // só stop-limit
      if (![0, 1, 10].includes(o.order_status)) return;   // só ativos
      const t = o.ticker;
      if (!map[t]) map[t] = { stop_price: o.stop_price, qty: o.quantity, count: 0 };
      map[t].count++;
      // se houver mais de uma SL pro ticker, mostramos a maior (pior caso)
      if (o.stop_price != null && (map[t].stop_price == null || o.stop_price > map[t].stop_price)) {
        map[t].stop_price = o.stop_price;
      }
    });
    return map;
  } catch (e) { console.warn('orders fail:', e.message); return {}; }
}

async function loadStopLoss() {
  _stopLoss = await fetchStopLossOrders();
  console.info('[overview] stop-loss orders:', Object.keys(_stopLoss).length);
  rerender();
}

async function recalcLiveSignal(ticker) {
  // Chamada per-ticker pra recalcular ML em tempo real (~4s). Usado pelo botão por card.
  try {
    const r = await fetch(`/api/v1/ml/predict_mvp/${ticker}`, { headers: { Authorization: 'Bearer ' + tok() } });
    if (!r.ok) throw new Error('http ' + r.status);
    return await r.json();
  } catch (e) { console.warn('predict_mvp fail:', ticker, e.message); return null; }
}

// Disparado pelo botão ↻ do badge ML do card. Atualiza só o ticker clicado.
async function recalcCardSignal(ticker) {
  // Encontra o botão e adiciona spinner
  const btns = document.querySelectorAll('.ov-ml-recalc');
  let btn = null;
  btns.forEach(b => {
    if (b.getAttribute('onclick')?.includes(`'${ticker}'`)) btn = b;
  });
  if (btn) { btn.textContent = '⟳'; btn.classList.add('spinning'); btn.disabled = true; }
  const result = await recalcLiveSignal(ticker);
  if (result) {
    _signals[ticker] = {
      ticker,
      signal: result.signal,
      predicted_return_pct: result.predicted_return_pct,
      predicted_log_return: result.predicted_log_return,
      horizon_days: result.calibration?.horizon_days,
      best_sharpe: result.calibration?.best_sharpe,
      live: true,
      computed_at: new Date().toISOString(),
    };
    rerender();  // re-render só o card afetado é overkill; rerender tudo é simples e rápido
    if (window.FAToast) FAToast.ok(`${ticker}: ${result.signal} (${result.predicted_return_pct?.toFixed(2)}%)`);
  } else {
    if (window.FAToast) FAToast.err(`${ticker}: falha no recálculo`);
    if (btn) { btn.textContent = '↻'; btn.classList.remove('spinning'); btn.disabled = false; }
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────
function renderCard(item) {
  const ticker = item.ticker;
  const q = _quotes[ticker] || { closes: [], last: null, prev: null };
  const sig = _signals[ticker] || null;
  const last = q.last;
  const prev = q.prev;
  let chg = null, chgPct = null, dir = 'flat';
  if (last != null && prev != null && prev !== 0) {
    chg = last - prev;
    chgPct = (chg / prev) * 100;
    dir = chg > 0 ? 'up' : (chg < 0 ? 'down' : 'flat');
  }
  const priceTxt = last != null ? 'R$ ' + f2(last) : (item.source === 'rf' ? 'R$ ' + f2(item.value) : '—');
  const chgTxt = (chg == null) ? (item.source === 'rf' ? '(RF)' : '—') : `${chg >= 0 ? '+' : ''}${f2(chg)} (${chg >= 0 ? '+' : ''}${chgPct.toFixed(2)}%)`;
  const spark = item.source === 'rf' ? '' : buildSparkline(q.closes, 220, 36);
  const tagText = { position: 'POS', watchlist: 'WL', crypto: 'CRP', rf: 'RF' }[item.source] || '?';
  const tagCls = { position: 'tag-pos', watchlist: 'tag-watch', crypto: 'tag-crypto', rf: 'tag-rf' }[item.source] || '';

  // ML signal badge + botão live recalc per-card (Phase D backlog)
  let mlHtml = '';
  if (sig && !sig.error) {
    const cls = sig.signal === 'BUY' ? 'buy' : (sig.signal === 'SELL' ? 'sell' : 'hold');
    const pctTxt = sig.predicted_return_pct != null ? ` <span class="ov-ml-pct">${sig.predicted_return_pct >= 0 ? '+' : ''}${sig.predicted_return_pct.toFixed(2)}%</span>` : '';
    const liveTag = sig.live ? ` · LIVE ${sig.computed_at?.slice(11,16) || ''}` : (sig.snapshot_date ? ` · snap ${sig.snapshot_date}` : '');
    mlHtml = `<span class="ov-ml ${cls}" title="ML signal · h${sig.horizon_days}d · sharpe ${sig.best_sharpe?.toFixed(2) || '—'}${liveTag}">${sig.signal}${pctTxt}</span>` +
             `<button class="ov-ml-recalc" onclick="event.preventDefault();event.stopPropagation();recalcCardSignal('${ticker}');" title="Recalcular ML em tempo real (~4s)">↻</button>`;
  } else {
    mlHtml = `<span class="ov-ml none" title="${sig?.error || 'sem modelo calibrado'}">—</span>` +
             `<button class="ov-ml-recalc" onclick="event.preventDefault();event.stopPropagation();recalcCardSignal('${ticker}');" title="Calcular ML em tempo real (~4s)">↻</button>`;
  }

  // P/L (positions e crypto): (last - avg) * qty
  let pnlHtml = '';
  if ((item.source === 'position' || item.source === 'crypto') && item.avg != null && item.qty != null && last != null) {
    const pnl = (last - item.avg) * item.qty;
    const pnlPct = item.avg !== 0 ? ((last - item.avg) / item.avg) * 100 : 0;
    const pnlDir = pnl > 0 ? 'up' : (pnl < 0 ? 'down' : 'flat');
    const sign = pnl >= 0 ? '+' : '';
    pnlHtml = `<div class="ov-pnl ${pnlDir}"><span class="ov-pnl-label">P/L</span>${sign}R$ ${f2(pnl)} (${sign}${pnlPct.toFixed(2)}%)</div>`;
  }

  // Stop-loss badge — qualquer ticker com stop-limit ativo
  const sl = _stopLoss[ticker];
  const slHtml = sl
    ? `<span class="ov-sl" title="Stop-loss ativo · stop R$ ${f2(sl.stop_price)} · qty ${sl.qty}${sl.count > 1 ? ' · ' + sl.count + ' ordens' : ''}">🛡 SL ${f2(sl.stop_price)}</span>`
    : '';

  const footRight = item.source === 'position' && item.avg != null ? `Pm R$ ${f2(item.avg)}` : (item.source === 'crypto' && item.avg != null ? `Pm R$ ${f2(item.avg)}` : (item.source === 'rf' ? (item.indexer || '') : ''));

  // Para RF não tem ticker B3 padrão; click leva a /fixed-income; demais → /dashboard
  const href = item.source === 'rf' ? '/fixed-income' : `/dashboard?ticker=${encodeURIComponent(ticker)}`;

  return `
    <a class="ov-card ${dir}" href="${href}" title="Abrir ${ticker}">
      <div class="ov-head">
        <span class="ov-ticker">${ticker}</span>
        <span class="ov-tag ${tagCls}">${tagText}</span>
      </div>
      <div class="ov-price">${priceTxt}</div>
      <div class="ov-chg ${dir}">${chgTxt}</div>
      ${pnlHtml}
      ${spark}
      <div class="ov-foot">
        ${mlHtml}
        ${slHtml}
        <span>${footRight}</span>
      </div>
    </a>
  `;
}

function applyFilters(items) {
  let arr = items.slice();
  if (_activeTab !== 'all') arr = arr.filter(i => i.source === _activeTab);
  if (_searchQ) {
    const q = _searchQ.toLowerCase();
    arr = arr.filter(i => i.ticker.toLowerCase().includes(q));
  }
  if (_activeMlFilter !== 'all') {
    arr = arr.filter(i => {
      const sig = _signals[i.ticker];
      return sig && sig.signal === _activeMlFilter;
    });
  }
  // Sort
  const sortFns = {
    'ticker':     (a, b) => a.ticker.localeCompare(b.ticker),
    'chg-desc':   (a, b) => (chgPctOf(b) ?? -Infinity) - (chgPctOf(a) ?? -Infinity),
    'chg-asc':    (a, b) => (chgPctOf(a) ?? Infinity)  - (chgPctOf(b) ?? Infinity),
    'value-desc': (a, b) => (b.value || 0) - (a.value || 0),
    'value-asc':  (a, b) => (a.value || 0) - (b.value || 0),
    'ml-buy':     (a, b) => (predOf(b)  ?? -Infinity) - (predOf(a)  ?? -Infinity),
    'ml-sell':    (a, b) => (predOf(a)  ?? Infinity)  - (predOf(b)  ?? Infinity),
  };
  arr.sort(sortFns[_activeSort] || sortFns.ticker);
  return arr;
}
function chgPctOf(item) {
  const q = _quotes[item.ticker];
  if (!q || q.last == null || q.prev == null || q.prev === 0) return null;
  return ((q.last - q.prev) / q.prev) * 100;
}
function predOf(item) {
  const s = _signals[item.ticker];
  return s && !s.error ? s.predicted_return_pct : null;
}

function applyDensity() {
  const grid = $('ov-grid');
  const btn = $('ov-density-btn');
  if (grid) grid.classList.toggle('compact', _density === 'compact');
  if (btn) btn.textContent = _density === 'compact' ? '📐 Detail' : '📐 Compact';
}

function toggleDensity() {
  _density = _density === 'compact' ? 'detail' : 'compact';
  localStorage.setItem('ov_density', _density);
  applyDensity();
}

function rerender() {
  const grid = $('ov-grid');
  const empty = $('ov-empty');
  const filtered = applyFilters(_allItems);
  applyDensity();  // garante classe compact aplicada após DOM ready
  if (!filtered.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    $('ov-status').textContent = `0 / ${_allItems.length}`;
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = filtered.map(renderCard).join('');
  const snapTxt = _signalsSnapshot ? ` · ML ${_signalsSnapshot}` : '';
  $('ov-status').textContent = `${filtered.length} / ${_allItems.length}${snapTxt}`;
  // Atualiza counts dos tabs
  ['all','position','watchlist','crypto','rf'].forEach(k => {
    const el = document.querySelector(`[data-count="${k}"]`);
    if (!el) return;
    el.textContent = k === 'all' ? _allItems.length : _allItems.filter(i => i.source === k).length;
  });
}

// ── ORQUESTRA ────────────────────────────────────────────────────────────
async function loadOverview() {
  if (!tok()) { window.location.href = '/login'; return; }
  $('ov-status').textContent = 'Carregando...';
  _allItems = [];
  _quotes = {};
  rerender();

  // Render progressivo — cada fonte rerender assim que chega.
  const addItems = (newItems) => {
    const seen = new Set(_allItems.map(i => i.source + ':' + i.ticker));
    newItems.forEach(it => {
      const key = it.source + ':' + it.ticker;
      if (!seen.has(key)) { _allItems.push(it); seen.add(key); }
    });
    rerender();
    fetchSparklinesBatch();
  };

  // Dispara as 4 fontes em paralelo, mas cada uma renderiza ao chegar
  fetchPositions().then(addItems);
  fetchCrypto().then(addItems);
  fetchWatchlist().then(addItems);
  fetchRF().then(items => { addItems(items); $('ov-updated').textContent = 'atualizado ' + new Date().toLocaleTimeString('pt-BR'); });

  // Stop-loss orders ativas (independente das fontes — re-renderiza ao chegar)
  loadStopLoss();

  // Últimas movimentações (atalho na home)
  // Carrega accounts ANTES das tx pra rotular coluna Conta corretamente
  fetchAccountsCache().then(() => fetchRecentTransactions().then(renderRecentTransactions));

  // ML signals — snapshot diário (signal_history). Query rápida (<100ms),
  // cache curto pra evitar refetch em tab-switches dentro da mesma sessão.
  const cached = sessionStorage.getItem('overview_signals');
  const cachedSnap = sessionStorage.getItem('overview_signals_snapshot');
  const cachedAt = parseInt(sessionStorage.getItem('overview_signals_at') || '0');
  const TTL = 5 * 60 * 1000;  // 5min — snapshot é diário, mas user pode reabrir página várias vezes/h
  if (cached && (Date.now() - cachedAt) < TTL) {
    try {
      _signals = JSON.parse(cached);
      _signalsSnapshot = cachedSnap || null;
      console.info('[overview] ML signals from cache:', Object.keys(_signals).length, 'snapshot:', _signalsSnapshot);
      rerender();
    } catch (e) { /* ignore */ }
  } else {
    loadMLSignals();  // auto-load (rápido, usa signal_history)
  }
}

// Recarrega snapshot ML (botão 🤖 ML ou auto-load).
async function loadMLSignals() {
  const { map, snapshot } = await fetchAllSignals();
  if (Object.keys(map).length > 0) {
    _signals = map;
    _signalsSnapshot = snapshot;
    sessionStorage.setItem('overview_signals', JSON.stringify(map));
    sessionStorage.setItem('overview_signals_snapshot', snapshot || '');
    sessionStorage.setItem('overview_signals_at', String(Date.now()));
    console.info('[overview] ML signals loaded:', Object.keys(map).length, 'snapshot:', snapshot);
    rerender();
  } else {
    console.warn('[overview] signal_history vazio (scheduler não rodou?)');
    if (window.FAToast) FAToast.warn('ML signals indisponíveis (snapshot vazio)');
  }
}

// Carrega sparklines pendentes (idempotente — só busca tickers ainda sem _quotes)
let _sparkInflight = false;
async function fetchSparklinesBatch() {
  if (_sparkInflight) return;
  _sparkInflight = true;
  try {
    const pending = _allItems
      .filter(it => it.source !== 'rf' && !(it.ticker in _quotes))
      .map(it => it.ticker);
    const unique = [...new Set(pending)];
    const BATCH = 6;
    for (let i = 0; i < unique.length; i += BATCH) {
      const batch = unique.slice(i, i + BATCH);
      const sparks = await Promise.all(batch.map(t => fetchSparkline(t)));
      sparks.forEach((s, j) => { _quotes[batch[j]] = s; });
      rerender();
    }
  } finally { _sparkInflight = false; }
}

// Eventos
function startAutoRefresh() {
  if (_refreshInterval) clearInterval(_refreshInterval);
  _refreshInterval = setInterval(loadOverview, REFRESH_MS);
}

window.addEventListener('DOMContentLoaded', async () => {
  if (window.FAAuth && FAAuth.requireAuth) {
    try { await FAAuth.requireAuth(); } catch (e) { return; }
  }

  // Tabs
  document.querySelectorAll('.ov-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.ov-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      _activeTab = btn.dataset.tab;
      rerender();
    });
  });
  // Sort
  $('ov-sort').addEventListener('change', e => { _activeSort = e.target.value; rerender(); });
  // ML filter
  $('ov-ml-filter').addEventListener('change', e => { _activeMlFilter = e.target.value; rerender(); });
  // Search
  $('ov-search').addEventListener('input', e => { _searchQ = e.target.value.trim(); rerender(); });

  loadOverview();
  startAutoRefresh();
});

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    if (_refreshInterval) { clearInterval(_refreshInterval); _refreshInterval = null; }
  } else {
    if (!_refreshInterval) { loadOverview(); startAutoRefresh(); }
  }
});
</script>
