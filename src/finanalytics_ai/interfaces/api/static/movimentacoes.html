<!doctype html>
<html lang="pt-BR" data-fa-page="movimentacoes">
<head>
<meta charset="utf-8">
<title>Movimentações — FinAnalytics</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script>(function(){try{var t=localStorage.getItem('fa_theme');
  if(t==='light'||t==='dark')document.documentElement.dataset.theme=t;}catch(e){}})();</script>
<link rel="stylesheet" href="/static/theme.css">
<style>
:root { --sb-w: 220px; --sb-w-collapsed: 52px; }
*{box-sizing:border-box}
body{margin:0;background:var(--bg,#080b10);color:var(--text,#cdd6e0);font-family:system-ui,sans-serif;min-height:100vh}
.fa-topbar{height:52px;background:var(--s1,#0d1117);border-bottom:1px solid var(--border,#1c2535);display:flex;align-items:center;gap:12px;padding:0 16px;position:sticky;top:0;z-index:300}
.fa-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.fa-logo-text{font-family:monospace;font-size:17px;font-weight:600;color:var(--text,#cdd6e0)}
.fa-logo-text em{color:var(--gold,#F0B429);font-style:normal}
.fa-ai-badge{background:var(--gold,#F0B429);color:#0a1628;font-size:12px;font-weight:800;padding:1px 5px;border-radius:3px;letter-spacing:.08em;vertical-align:middle;margin-left:2px}
.fa-user-chip{display:flex;align-items:center;gap:6px;margin-left:auto}
.fa-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#1B3A6B,#0b2040);border:1px solid #1e3a5f;display:flex;align-items:center;justify-content:center;font-size:14px;color:#8899aa}
.fa-logout-btn{background:transparent;border:1px solid var(--border,#1c2535);border-radius:5px;color:var(--muted,#4a5e72);font-size:13px;padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.15s}
.fa-logout-btn:hover{color:var(--red,#ff3d5a);border-color:var(--red,#ff3d5a)}
.fa-sidebar{position:fixed;left:0;top:52px;bottom:0;width:var(--sb-w-collapsed);background:#0a0f18;border-right:1px solid var(--border,#1c2535);display:flex;flex-direction:column;overflow:hidden;transition:width .22s cubic-bezier(.4,0,.2,1);z-index:200}
.fa-sidebar.open{width:var(--sb-w)}
.fa-sidebar-toggle{width:100%;padding:10px 14px;background:transparent;border:none;border-bottom:1px solid var(--border,#1c2535);color:#7a95b0;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:15px;white-space:nowrap;overflow:hidden}
.fa-sidebar-toggle:hover{color:var(--gold,#F0B429);background:rgba(240,180,41,.06)}
.fa-sidebar-toggle svg{flex-shrink:0}
.fa-sb-link{display:flex;align-items:center;gap:10px;padding:7px 14px;color:#6a8aa8;text-decoration:none;font-size:14px;white-space:nowrap;overflow:hidden;transition:all .15s}
.fa-sb-link:hover{color:var(--text,#cdd6e0);background:rgba(0,212,255,.05)}
.fa-sb-link.active{color:var(--accent,#00d4ff);background:rgba(0,212,255,.08);border-right:2px solid var(--accent,#00d4ff)}
.fa-sb-link svg{flex-shrink:0}
.fa-sb-link span{opacity:0;transition:opacity .15s}
.fa-sidebar.open .fa-sb-link span{opacity:1}
.fa-page-content{margin-left:var(--sb-w-collapsed);transition:margin-left .22s cubic-bezier(.4,0,.2,1)}
body.sb-open .fa-page-content{margin-left:var(--sb-w)}
.mv-wrap { padding: 20px 24px; max-width: 1280px; margin: 0 auto; }
.mv-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; flex-wrap: wrap }
.mv-head h1 { font-size: 22px; margin: 0; font-weight: 700 }
.mv-meta { font-size: 12px; color: var(--muted); margin-left: auto }
.mv-filters { display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; padding:12px;
  background:var(--card,rgba(10,22,40,.5)); border:1px solid var(--border); border-radius:10px; margin-bottom:14px }
.mv-filters .fld { display:flex; flex-direction:column; gap:3px }
.mv-filters label { font-size:10px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase }
.mv-filters input, .mv-filters select { background:rgba(10,22,40,.6); border:1px solid var(--border); color:var(--white);
  padding:6px 8px; border-radius:5px; font-size:12px; outline:none; min-width:120px }
.mv-filters input:focus, .mv-filters select:focus { border-color:var(--blue,#3abff8) }
.mv-table-wrap { background:var(--card,rgba(10,22,40,.4)); border:1px solid var(--border); border-radius:10px; overflow:hidden }
.mv-table { width:100%; border-collapse:collapse; font-size:12px }
.mv-table thead { background:rgba(10,22,40,.7) }
.mv-table th { padding:8px 10px; text-align:left; font-weight:700; letter-spacing:.5px; text-transform:uppercase; font-size:10px; color:var(--muted); border-bottom:1px solid var(--border) }
.mv-table td { padding:7px 10px; border-bottom:1px solid var(--border); vertical-align:top }
.mv-table tbody tr:hover { background:rgba(58,191,248,.04) }
.mv-mono { font-family:'DM Mono',monospace }
.mv-amt-pos { color:var(--green,#5fd99a); font-weight:600 }
.mv-amt-neg { color:var(--red,#e05555); font-weight:600 }
.mv-tag { font-size:10px; padding:2px 6px; border-radius:3px; font-weight:700; letter-spacing:.5px; text-transform:uppercase }
.mv-tag-settled { background:rgba(95,217,154,.15); color:var(--green,#5fd99a) }
.mv-tag-pending { background:rgba(240,180,41,.15); color:var(--gold,#F0B429) }
.mv-tag-cancelled { background:rgba(224,85,85,.15); color:var(--red,#e05555) }
.mv-empty { padding:30px; text-align:center; color:var(--muted) }
.mv-totals { padding:10px 14px; background:rgba(10,22,40,.6); border-top:1px solid var(--border);
  display:flex; gap:18px; font-size:12px; flex-wrap:wrap }
.mv-totals strong { font-family:'DM Mono',monospace }
.mv-tx-type { font-size:10px; text-transform:uppercase; color:var(--muted); letter-spacing:.5px }
.sort-ind { font-size:10px; opacity:.7; margin-left:3px }
.sort-ind.active { color:var(--blue,#3abff8); opacity:1 }
</style>
</head>
<body>

<div class="fa-topbar">
  <a href="/" class="fa-logo">
    <span class="fa-logo-text">Fin<em>Analytics</em><span class="fa-ai-badge">AI</span></span>
  </a>
  <div class="fa-user-chip">
    <div class="fa-avatar" id="avatarInitial">?</div>
    <span id="topbarEmail" style="font-size:13px;color:var(--muted)"></span>
    <button class="fa-logout-btn" onclick="if(window.faLogout)faLogout();else{localStorage.removeItem('access_token');location.href='/login'}">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Sair
    </button>
  </div>
</div>

<aside class="fa-sidebar" id="sidebar"></aside>

<div class="fa-page-content">
<main class="mv-wrap">
  <div class="mv-head">
    <h1><span data-i18n="mv.title">📋 Movimentações</span></h1>
    <span class="mv-meta" id="mv-meta">—</span>
    <button class="ov-refresh-btn" onclick="loadTransactions()" style="background:rgba(58,191,248,.15);border:1px solid var(--blue,#3abff8);color:var(--blue,#3abff8);padding:6px 12px;border-radius:5px;cursor:pointer;font-size:12px" data-i18n="mv.refresh">↻ Atualizar</button>
    <button class="ov-refresh-btn" onclick="exportCsv()" style="background:rgba(95,217,154,.15);border:1px solid var(--green,#5fd99a);color:var(--green,#5fd99a);padding:6px 12px;border-radius:5px;cursor:pointer;font-size:12px" data-i18n="mv.export_csv">📥 CSV</button>
    <button class="ov-refresh-btn" onclick="window.print()" style="background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:5px;cursor:pointer;font-size:12px" data-i18n="mv.print">🖨 Imprimir</button>
  </div>

  <div class="mv-filters">
    <div class="fld"><label data-i18n="mv.f.search">Buscar (ticker/desc)</label><input id="f-q" type="text" placeholder="PETR4, dividendo..." oninput="rerender()" data-i18n-attr="placeholder:mv.f.search_ph"></div>
    <div class="fld"><label data-i18n="mv.f.account">Conta</label><select id="f-acc" onchange="rerender()"><option value="" data-i18n="mv.f.all">Todas</option></select></div>
    <div class="fld"><label data-i18n="mv.f.type">Tipo</label><select id="f-type" onchange="rerender()"><option value="" data-i18n="mv.f.all_m">Todos</option></select></div>
    <div class="fld"><label data-i18n="mv.f.direction">Direção</label><select id="f-dir" onchange="loadTransactions()">
      <option value="" data-i18n="mv.f.both">Ambas</option>
      <option value="credit" data-i18n="mv.f.credit">Entradas (+)</option>
      <option value="debit" data-i18n="mv.f.debit">Saídas (-)</option>
    </select></div>
    <div class="fld"><label data-i18n="mv.f.status">Status</label><select id="f-status" onchange="loadTransactions()">
      <option value="" data-i18n="mv.f.all_m">Todos</option>
      <option value="settled" data-i18n="mv.st.settled">Liquidado</option>
      <option value="pending" data-i18n="mv.st.pending">Pendente</option>
      <option value="cancelled" data-i18n="mv.st.cancelled">Cancelado</option>
    </select></div>
    <div class="fld"><label data-i18n="mv.f.from">De</label><input id="f-from" type="date" onchange="loadTransactions()"></div>
    <div class="fld"><label data-i18n="mv.f.to">Até</label><input id="f-to" type="date" onchange="loadTransactions()"></div>
  </div>

  <div class="mv-table-wrap">
    <table class="mv-table">
      <thead><tr>
        <th onclick="sortBy('reference_date')" style="cursor:pointer" data-i18n="mv.col.date">Data <span class="sort-ind" data-col="reference_date"></span></th>
        <th onclick="sortBy('account_id')" style="cursor:pointer" data-i18n="mv.col.account">Conta <span class="sort-ind" data-col="account_id"></span></th>
        <th onclick="sortBy('tx_type')" style="cursor:pointer" data-i18n="mv.col.type">Tipo <span class="sort-ind" data-col="tx_type"></span></th>
        <th onclick="sortBy('ticker')" style="cursor:pointer" data-i18n="mv.col.ticker">Ticker <span class="sort-ind" data-col="ticker"></span></th>
        <th onclick="sortBy('amount')" style="text-align:right;cursor:pointer" data-i18n="mv.col.amount">Valor <span class="sort-ind" data-col="amount"></span></th>
        <th onclick="sortBy('status')" style="cursor:pointer" data-i18n="mv.col.status">Status <span class="sort-ind" data-col="status"></span></th>
        <th data-i18n="mv.col.description">Descrição</th><th></th>
      </tr></thead>
      <tbody id="mv-tbody"><tr><td colspan="8" class="mv-empty">Carregando...</td></tr></tbody>
    </table>
    <div class="mv-totals" id="mv-totals">—</div>
    <div id="mv-paging" style="padding:8px 14px;background:rgba(10,22,40,.4);border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;font-size:12px;color:var(--muted);justify-content:flex-end">
      <span>Por página:</span>
      <select id="mv-page-size" onchange="changePageSize()" style="background:rgba(10,22,40,.6);border:1px solid var(--border);color:var(--white);padding:3px 6px;border-radius:4px;font-size:12px">
        <option value="50">50</option>
        <option value="100" selected>100</option>
        <option value="200">200</option>
        <option value="500">500</option>
      </select>
      <button onclick="changePage(-1)" id="mv-prev" style="background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);padding:3px 10px;border-radius:4px;cursor:pointer">← Anterior</button>
      <span id="mv-page-info">—</span>
      <button onclick="changePage(1)" id="mv-next" style="background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);padding:3px 10px;border-radius:4px;cursor:pointer">Próxima →</button>
    </div>
  </div>
</main>
</div><!-- /fa-page-content -->

<!-- Modal Reconciliar (C6 Fase 4) -->
<div id="modal-reconcile" style="display:none;position:fixed;inset:0;background:rgba(10,22,40,.92);z-index:500;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--navy-mid,#142540);border:1px solid var(--border);border-radius:10px;padding:22px;width:440px;max-width:95vw">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 style="margin:0;font-size:16px">🔗 Reconciliar transação</h3>
      <button onclick="closeReconcileModal()" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:20px">×</button>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px">
      <div>Tx <strong id="rec-tx-id"></strong></div>
      <div style="margin-top:4px">Descrição original: <em id="rec-original-note" style="color:var(--white)"></em></div>
    </div>
    <label style="font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase">Ticker da posição</label>
    <input id="rec-ticker" type="text" placeholder="Ex: PETR4" style="width:100%;padding:8px;background:rgba(10,22,40,.6);border:1px solid var(--border);color:var(--white);border-radius:6px;margin-top:4px;text-transform:uppercase">
    <div style="font-size:10px;color:var(--muted);margin-top:4px">Backend procura uma posição do ticker em qualquer carteira sua. Se não houver, retorna erro.</div>
    <div id="rec-msg" style="font-size:11px;color:var(--red);min-height:14px;margin-top:8px"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
      <button onclick="closeReconcileModal()" style="padding:7px 12px;background:rgba(255,255,255,.08);color:var(--muted);border:none;border-radius:5px;cursor:pointer">Cancelar</button>
      <button onclick="submitReconcile()" style="padding:7px 12px;background:var(--blue,#3abff8);color:white;border:none;border-radius:5px;cursor:pointer;font-weight:600">Vincular</button>
    </div>
  </div>
</div>

<script src="/static/auth_guard.js"></script>
<script src="/static/sidebar.js"></script>
<script src="/static/error_handler.js"></script>
<script src="/static/toast.js"></script>
<script src="/static/theme_toggle.js"></script>
<script src="/static/locale_toggle.js"></script>

<script>
'use strict';

let _allTx = [];
let _accountsMap = {};   // id -> {apelido, institution_name}
let _sortCol = 'reference_date';
let _sortDir = -1;       // -1 desc, 1 asc
let _page = 1;
let _pageSize = 100;

function $(id) { return document.getElementById(id); }
function tok() { return localStorage.getItem('access_token'); }
function authHeaders() { return { Authorization: 'Bearer ' + tok() }; }
function f2(n) { return (n == null || isNaN(n)) ? '—' : (+n).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

async function loadAccounts() {
  try {
    const r = await fetch('/api/v1/wallet/accounts', { headers: authHeaders() });
    if (!r.ok) return;
    const accs = await r.json();
    _accountsMap = {};
    accs.forEach(a => { _accountsMap[a.id] = { apelido: a.apelido, institution_name: a.institution_name }; });
    const sel = $('f-acc');
    sel.innerHTML = '<option value="">Todas</option>' + accs.map(a => {
      const lbl = (a.apelido || a.titular || a.institution_name || a.id.slice(0, 8));
      return `<option value="${a.id}">${lbl}</option>`;
    }).join('');
  } catch (e) { console.warn('accounts fail:', e.message); }
}

async function loadTransactions() {
  const tbody = $('mv-tbody');
  tbody.innerHTML = '<tr><td colspan="7" class="mv-empty">Carregando...</td></tr>';
  try {
    const params = new URLSearchParams();
    const dir = $('f-dir').value; if (dir) params.set('direction', dir);
    const st = $('f-status').value; if (st) params.set('status', st);
    const df = $('f-from').value; if (df) params.set('date_from', df);
    const dt = $('f-to').value; if (dt) params.set('date_to', dt);
    params.set('limit', '2000');
    const r = await fetch('/api/v1/wallet/transactions?' + params.toString(), { headers: authHeaders() });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    _allTx = await r.json();
    populateTypeFilter();
    rerender();
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="7" class="mv-empty" style="color:var(--red)">Erro: ${e.message}</td></tr>`;
  }
}

function populateTypeFilter() {
  const types = [...new Set(_allTx.map(t => t.tx_type).filter(Boolean))].sort();
  const sel = $('f-type');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Todos</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
  sel.value = cur;
}

function applyFilters() {
  const q = $('f-q').value.toLowerCase().trim();
  const acc = $('f-acc').value;
  const type = $('f-type').value;
  let arr = _allTx.slice();
  if (q) arr = arr.filter(t => (t.ticker || '').toLowerCase().includes(q) || (t.note || '').toLowerCase().includes(q) || (t.tx_type || '').toLowerCase().includes(q));
  if (acc) arr = arr.filter(t => t.account_id === acc);
  if (type) arr = arr.filter(t => t.tx_type === type);
  return arr;
}

function applySort(arr) {
  return arr.slice().sort((a, b) => {
    let va = a[_sortCol];
    let vb = b[_sortCol];
    if (_sortCol === 'amount') { va = parseFloat(va) || 0; vb = parseFloat(vb) || 0; }
    else { va = (va || '').toString(); vb = (vb || '').toString(); }
    if (va < vb) return -1 * _sortDir;
    if (va > vb) return 1 * _sortDir;
    return 0;
  });
}

function sortBy(col) {
  if (_sortCol === col) _sortDir = -_sortDir;
  else { _sortCol = col; _sortDir = 1; }
  _page = 1;
  rerender();
}

function changePage(delta) {
  const filtered = applyFilters();
  const totalPages = Math.max(1, Math.ceil(filtered.length / _pageSize));
  _page = Math.max(1, Math.min(totalPages, _page + delta));
  rerender();
}

function changePageSize() {
  _pageSize = parseInt($('mv-page-size').value) || 100;
  _page = 1;
  rerender();
}

function exportCsv() {
  const filtered = applyFilters();  // exporta tudo filtrado, não só a página
  const sorted = applySort(filtered);
  const header = ['Data', 'Conta', 'Tipo', 'Ticker', 'Valor', 'Status', 'Descricao'];
  const rows = sorted.map(t => {
    const acc = _accountsMap[t.account_id];
    const accLbl = acc ? (acc.apelido || acc.institution_name || t.account_id.slice(0, 8)) : t.account_id.slice(0, 8);
    const date = (t.reference_date || t.created_at || '').slice(0, 10);
    return [date, accLbl, t.tx_type || '', t.ticker || '', t.amount, t.status || '', (t.note || '').replace(/[\r\n,;]/g, ' ')];
  });
  const csv = [header, ...rows].map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `movimentacoes_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function updateSortIndicators() {
  document.querySelectorAll('.sort-ind').forEach(el => {
    el.classList.remove('active');
    el.textContent = '';
    if (el.dataset.col === _sortCol) {
      el.classList.add('active');
      el.textContent = _sortDir === 1 ? '↑' : '↓';
    }
  });
}

function rerender() {
  const tbody = $('mv-tbody');
  const filtered = applyFilters();
  updateSortIndicators();

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="mv-empty">Nenhuma movimentação para os filtros selecionados.</td></tr>';
    $('mv-meta').textContent = `0 / ${_allTx.length}`;
    $('mv-totals').textContent = '—';
    $('mv-page-info').textContent = '0 de 0';
    return;
  }
  const sorted = applySort(filtered);
  const totalPages = Math.max(1, Math.ceil(sorted.length / _pageSize));
  _page = Math.min(_page, totalPages);
  const start = (_page - 1) * _pageSize;
  const arr = sorted.slice(start, start + _pageSize);
  $('mv-page-info').textContent = `Pág ${_page} de ${totalPages} (${start + 1}-${Math.min(start + _pageSize, sorted.length)} de ${sorted.length})`;

  tbody.innerHTML = arr.map(t => {
    const acc = _accountsMap[t.account_id];
    const accLbl = acc ? (acc.apelido || acc.institution_name || t.account_id.slice(0, 8)) : t.account_id.slice(0, 8);
    const amt = parseFloat(t.amount) || 0;
    const amtCls = amt > 0 ? 'mv-amt-pos' : (amt < 0 ? 'mv-amt-neg' : '');
    const sign = amt > 0 ? '+' : '';
    const stCls = `mv-tag mv-tag-${t.status || 'pending'}`;
    const stLbl = t.status === 'settled' ? 'Liquidado' : (t.status === 'pending' ? 'Pendente' : (t.status === 'cancelled' ? 'Cancelado' : (t.status || '—')));
    const dateTxt = (t.reference_date || t.created_at || '').slice(0, 10);
    // Reconciliação manual: dividendos sem related_id são candidatos
    const isDiv = (t.tx_type || '').toLowerCase().includes('dividend') || t.tx_type === 'jcp' || t.tx_type === 'rendimento';
    const needsRecon = isDiv && !t.related_id;
    const reconBtn = needsRecon
      ? `<button onclick="openReconcileModal('${t.id}', '${(t.note||'').replace(/'/g,"\\'")}')" title="Reconciliar (vincular a posição)" style="background:rgba(240,180,41,.15);border:none;color:var(--gold,#F0B429);cursor:pointer;padding:3px 7px;border-radius:3px;font-size:11px;font-weight:600">🔗 Reconciliar</button>`
      : '';
    return `<tr>
      <td class="mv-mono">${dateTxt}</td>
      <td>${accLbl}</td>
      <td><span class="mv-tx-type">${t.tx_type || '—'}</span></td>
      <td><strong>${t.ticker || '—'}</strong></td>
      <td class="mv-mono" style="text-align:right"><span class="${amtCls}">${sign}R$ ${f2(amt)}</span></td>
      <td><span class="${stCls}">${stLbl}</span></td>
      <td style="font-size:11px;color:var(--muted)">${t.note || '—'}</td>
      <td>${reconBtn}</td>
    </tr>`;
  }).join('');

  // Totais (sobre TODO o filtrado, não só a página)
  const totalCredit = sorted.filter(t => t.amount > 0 && t.status === 'settled').reduce((a, t) => a + parseFloat(t.amount), 0);
  const totalDebit = sorted.filter(t => t.amount < 0 && t.status === 'settled').reduce((a, t) => a + parseFloat(t.amount), 0);
  const totalPending = sorted.filter(t => t.status === 'pending').reduce((a, t) => a + parseFloat(t.amount), 0);
  const net = totalCredit + totalDebit;
  $('mv-totals').innerHTML =
    `<span>Entradas liquidadas: <strong class="mv-amt-pos">+R$ ${f2(totalCredit)}</strong></span>` +
    `<span>Saídas liquidadas: <strong class="mv-amt-neg">R$ ${f2(totalDebit)}</strong></span>` +
    `<span>Pendentes: <strong>${totalPending >= 0 ? '+' : ''}R$ ${f2(totalPending)}</strong></span>` +
    `<span style="margin-left:auto">Net liquidado: <strong style="color:${net >= 0 ? 'var(--green)' : 'var(--red)'}">${net >= 0 ? '+' : ''}R$ ${f2(net)}</strong></span>`;
  $('mv-meta').textContent = `${sorted.length} / ${_allTx.length} movimentações`;
}

// ── Reconciliação manual (C6 Fase 4) ──────────────────────────────────────
let _reconcileTxId = null;

function openReconcileModal(txId, originalNote) {
  _reconcileTxId = txId;
  $('rec-tx-id').textContent = txId.slice(0, 8) + '…';
  $('rec-original-note').textContent = originalNote || '(sem descrição)';
  $('rec-ticker').value = '';
  $('rec-msg').textContent = '';
  $('modal-reconcile').style.display = 'flex';
  setTimeout(() => $('rec-ticker').focus(), 80);
}

function closeReconcileModal() {
  $('modal-reconcile').style.display = 'none';
  _reconcileTxId = null;
}

async function submitReconcile() {
  if (!_reconcileTxId) return;
  const ticker = $('rec-ticker').value.trim().toUpperCase();
  const msg = $('rec-msg');
  msg.textContent = '';
  if (!ticker) { msg.textContent = 'Informe um ticker.'; return; }
  try {
    const r = await fetch(`/api/v1/wallet/transactions/${_reconcileTxId}/reconcile`, {
      method: 'POST',
      headers: { ...authHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker }),
    });
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      msg.textContent = d.detail || ('HTTP ' + r.status);
      return;
    }
    closeReconcileModal();
    if (window.FAToast) FAToast.ok(`Tx vinculada à posição ${ticker}`);
    loadTransactions();
  } catch (e) {
    msg.textContent = 'Erro de rede: ' + e.message;
  }
}

window.addEventListener('DOMContentLoaded', async () => {
  if (window.FAAuth && FAAuth.requireAuth) {
    try { await FAAuth.requireAuth(); } catch (e) { return; }
  }
  await loadAccounts();
  loadTransactions();
});
</script>
