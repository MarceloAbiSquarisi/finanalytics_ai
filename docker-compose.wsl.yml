      # de uma sessao WSL mas pode mudar apos `wsl --shutdown` ou reboot
      # Windows. Verifique com: wsl -d Ubuntu-22.04 -- ip route show default
      - "host.docker.internal:172.17.80.1"

  fintz_sync_worker:
    extra_hosts:
      # IP DIRETO do WSL gateway (= Windows host) em vez de host-gateway:
