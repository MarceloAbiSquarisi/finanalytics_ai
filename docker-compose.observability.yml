# ──────────────────────────────────────────────────────────────────────────────
# docker-compose.observability.yml — Redis + Prometheus + Grafana
# ──────────────────────────────────────────────────────────────────────────────
services:

  redis:
    image: redis:7.2-alpine
    container_name: finanalytics_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    networks:
      finanalytics_net:
        aliases: [redis, finanalytics_redis]
      platform_net:
        aliases: [redis, finanalytics_redis]

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: finanalytics_prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - platform_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:10.4.2
    container_name: finanalytics_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:          admin
      GF_SECURITY_ADMIN_PASSWORD:      admin
      GF_USERS_ALLOW_SIGN_UP:          "false"
      GF_ANALYTICS_REPORTING_ENABLED:  "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - platform_net

networks:
  finanalytics_net:
    external: true
    name: finanalytics_net
  platform_net:
    external: true
    name: finanalytics-platform_default

volumes:
  prometheus_data:
    name: finanalytics_prometheus_data
  grafana_data:
    name: finanalytics_grafana_data
