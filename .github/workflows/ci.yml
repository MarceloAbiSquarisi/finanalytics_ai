name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff format
        run: ruff format src/ tests/

      - name: ruff check
        run: ruff check src/ tests/ --output-format=github --fix

      - name: Commit auto-fixes (se houver)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add -A && git commit -m "style: auto-fix ruff [skip ci]")
          git push || true

      - name: mypy
        run: mypy --package finanalytics_ai --ignore-missing-imports

      - name: pytest
        run: pytest tests/unit/ -q --tb=short
        env:
          APP_SECRET_KEY: ci-secret-key-for-tests-only-32chars
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost/finanalytics_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
