version: "3.9"

services:
  app:
    restart: always
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9090:9090"

  db:
    restart: always
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finanalytics
      POSTGRES_USER: finanalytics
      POSTGRES_PASSWORD: finanalytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finanalytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    restart: always
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
