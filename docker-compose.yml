# ──────────────────────────────────────────────────────────────────────────────
# FinAnalytics AI — Stack principal
# ──────────────────────────────────────────────────────────────────────────────
services:

  postgres:
    image: postgres:16-alpine
    container_name: finanalytics_postgres
    restart: always
    environment:
      POSTGRES_DB:       finanalytics
      POSTGRES_USER:     finanalytics
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - E:/finanalytics_data/docker/postgres:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U finanalytics -d finanalytics"]
      interval: 5s
      timeout:  5s
      retries:  10
    networks:
      - finanalytics_net

  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: finanalytics_timescale
    restart: always
    environment:
      POSTGRES_DB:       market_data
      POSTGRES_USER:     finanalytics
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-timescale_secret}
    ports:
      - "${TIMESCALE_PORT:-5433}:5432"
    volumes:
      - E:/finanalytics_data/docker/timescale:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U finanalytics -d market_data"]
      interval: 5s
      timeout:  5s
      retries:  10
    networks:
      finanalytics_net:
        aliases: [timescale, timescaledb]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: finanalytics_zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - E:/finanalytics_data/docker/kafka/zk-data:/var/lib/zookeeper/data
      - E:/finanalytics_data/docker/kafka/zk-logs:/var/lib/zookeeper/log
    healthcheck:
      test:     ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - finanalytics_net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: finanalytics_kafka
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS:             INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENERS:                        INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME:       INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
      KAFKA_LOG_RETENTION_HOURS:              168
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - E:/finanalytics_data/docker/kafka:/var/lib/kafka/data
    healthcheck:
      test:     ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout:  10s
      retries:  10
      start_period: 30s
    networks:
      finanalytics_net:
        aliases: [kafka]

  redis:
    image: redis:7.2-alpine
    container_name: finanalytics_redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  5
    networks:
      finanalytics_net:
        aliases: [redis]

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: finanalytics-ai:latest
    container_name: finanalytics_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL:            postgresql+asyncpg://finanalytics:${POSTGRES_PASSWORD:-secret}@postgres:5432/finanalytics
      TIMESCALE_URL:           postgresql://finanalytics:${TIMESCALE_PASSWORD:-timescale_secret}@timescale:5432/market_data
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EVENT_QUEUE_BACKEND:     kafka
      REDIS_URL:               redis://redis:6379/0
      DATA_DIR:                /data
    volumes:
      - ${DATA_DIR_HOST:-E:/finanalytics_data}:/data
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test:     ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen(\'http://localhost:8000/health\')\""]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 40s
    networks:
      - finanalytics_net

  ohlc_ingestor:
    image: finanalytics-ai:latest
    container_name: finanalytics_ohlc_ingestor
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      disable: true
    env_file: .env
    environment:
      DATABASE_DSN:      postgresql://finanalytics:${POSTGRES_PASSWORD:-secret}@postgres:5432/finanalytics
      BRAPI_TOKEN:       ${BRAPI_TOKEN}
      BRAPI_BASE_URL:    ${BRAPI_BASE_URL:-https://brapi.dev/api}
      POLL_INTERVAL:     "60"
      PYTHONPATH:        /app/src
      APP_SECRET_KEY:    ${APP_SECRET_KEY:-ingestor-local}
      DATABASE_URL:      postgresql+asyncpg://finanalytics:${POSTGRES_PASSWORD:-secret}@postgres:5432/finanalytics
      REDIS_URL:         redis://redis:6379/0
    volumes:
      - ./src:/app/src:ro
    command: python /app/src/finanalytics_ai/workers/ohlc_1m_ingestor.py
    networks:
      - finanalytics_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: finanalytics-worker:latest
    container_name: finanalytics_worker
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL:        postgresql+asyncpg://finanalytics:${POSTGRES_PASSWORD:-secret}@postgres:5432/finanalytics
      REDIS_URL:           redis://redis:6379/0
      EVENT_QUEUE_BACKEND: memory
      DATA_DIR:            /data
    volumes:
      - ${DATA_DIR_HOST:-E:/finanalytics_data}:/data
    networks:
      - finanalytics_net

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: finanalytics-worker:latest
    container_name: finanalytics_scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATA_DIR:                  /data
      BRAPI_TOKEN:               ${BRAPI_TOKEN}
      BRAPI_BASE_URL:            ${BRAPI_BASE_URL:-https://brapi.dev/api}
      SCHEDULER_MACRO_HOUR:      ${SCHEDULER_MACRO_HOUR:-6}
      SCHEDULER_OHLCV_HOUR:      ${SCHEDULER_OHLCV_HOUR:-7}
      SCHEDULER_TZ_OFFSET:       ${SCHEDULER_TZ_OFFSET:--3}
      SCHEDULER_MACRO_ENABLED:   ${SCHEDULER_MACRO_ENABLED:-true}
      SCHEDULER_OHLCV_ENABLED:   ${SCHEDULER_OHLCV_ENABLED:-true}
      RUN_ONCE:                  ${SCHEDULER_RUN_ONCE:-false}
      PYTHONPATH:                /app/src
    volumes:
      - ${DATA_DIR_HOST:-E:/finanalytics_data}:/data
    entrypoint: ["python"]
    command: ["/app/src/finanalytics_ai/workers/scheduler_worker.py"]
    networks:
      - finanalytics_net

  fintz_sync_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: finanalytics-worker:latest
    container_name: finanalytics_fintz_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL:          postgresql+asyncpg://finanalytics:${POSTGRES_PASSWORD:-secret}@postgres:5432/finanalytics
      RUN_ONCE:              "false"
      FINTZ_SYNC_HOUR:       "22"
      FINTZ_SYNC_MINUTE:     "5"
      SCHEDULER_TZ_OFFSET:   "-3"
      FINTZ_MAX_CONCURRENT:  "5"
    profiles:
      - workers
    networks:
      - finanalytics_net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: finanalytics_grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - finanalytics_net

  pgadmin:
    image: dpage/pgadmin4:8.5
    container_name: finanalytics_pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@finanalytics.ai}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - finanalytics_net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: finanalytics_kafka_ui
    restart: unless-stopped
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: finanalytics
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - finanalytics_net

  redis-insight:
    image: redis/redisinsight:2.50
    container_name: finanalytics_redisinsight
    restart: unless-stopped
    ports:
      - "${REDISINSIGHT_PORT:-8001}:5540"
    networks:
      - finanalytics_net

networks:
  finanalytics_net:
    name: finanalytics_net
    driver: bridge

volumes:
  grafana_data:
  pgadmin_data:
