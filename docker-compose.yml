# ──────────────────────────────────────────────────────────────────────────────
# FinAnalytics AI — Stack completa standalone
#
# Serviços:
#   postgres    → banco principal (portfolios, eventos, alertas)
#   timescale   → TimescaleDB para séries temporais (ticks, OHLC)
#   zookeeper   → dependência do Kafka
#   kafka       → broker de mensagens
#   api         → FastAPI + consumer + producer
#
# Uso rápido:
#   cp .env.docker .env
#   docker compose up -d
#   docker compose logs -f api
#
# Para parar e limpar volumes:
#   docker compose down -v
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL (banco principal) ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finanalytics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       finanalytics
      POSTGRES_USER:     finanalytics
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finanalytics_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro   # cria tabelas na 1ª inicialização
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U finanalytics -d finanalytics"]
      interval: 5s
      timeout:  5s
      retries:  10
    networks:
      - finanalytics_net

  # ── TimescaleDB (séries temporais) ────────────────────────────────────────
  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: finanalytics_timescale
    restart: unless-stopped
    environment:
      POSTGRES_DB:       market_data
      POSTGRES_USER:     finanalytics
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-timescale_secret}
    ports:
      - "${TIMESCALE_PORT:-5433}:5432"
    volumes:
      - tsdata:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U finanalytics -d market_data"]
      interval: 5s
      timeout:  5s
      retries:  10
    networks:
      - finanalytics_net

  # ── Zookeeper (dependência do Kafka) ──────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: finanalytics_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zkdata:/var/lib/zookeeper/data
      - zklogs:/var/lib/zookeeper/log
    healthcheck:
      test:     ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - finanalytics_net

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: finanalytics_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      # INTERNAL: comunicação entre containers
      # EXTERNAL: acesso do host (localhost:9092)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:  INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS:             INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENERS:                        INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME:       INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
      KAFKA_LOG_RETENTION_HOURS:              168   # 7 dias
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test:     ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout:  10s
      retries:  10
      start_period: 30s
    networks:
      - finanalytics_net

  # ── API FastAPI ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    image: finanalytics-ai:latest
    container_name: finanalytics_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      timescale:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      # Sobrescreve os valores do .env com hostnames internos do Docker
      DATABASE_URL:     postgresql+asyncpg://finanalytics:${POSTGRES_PASSWORD:-finanalytics_secret}@postgres:5432/finanalytics
      TIMESCALE_URL:    postgresql://finanalytics:${TIMESCALE_PASSWORD:-timescale_secret}@timescale:5432/market_data
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092   # listener INTERNAL
      EVENT_QUEUE_BACKEND:     kafka
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test:     ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 40s
    networks:
      - finanalytics_net

networks:
  finanalytics_net:
    name: finanalytics_net
    driver: bridge

volumes:
  pgdata:
  tsdata:
  kafkadata:
  zkdata:
  zklogs:
