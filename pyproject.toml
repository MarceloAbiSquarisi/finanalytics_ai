[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "finanalytics_ai"
version = "0.1.0"
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]

# ─────────────────────────────────────────────
# RUFF
# ─────────────────────────────────────────────
[tool.ruff]
src = ["src"]
line-length = 110
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "C4", "SIM", "TCH", "ANN", "PT", "RUF"]
ignore = [
    "ANN401",
    "RUF001",
    "RUF002",
    "RUF003",
]

[tool.ruff.lint.per-file-ignores]
"src/finanalytics_ai/interfaces/api/**"                                      = ["B008", "ANN001", "ANN201", "ANN202"]
"src/finanalytics_ai/application/services/fixed_income_service.py"           = ["E402"]
"src/finanalytics_ai/application/services/fund_analysis_service.py"          = ["E501"]
"src/finanalytics_ai/application/services/rf_portfolio_service.py"           = ["E402", "ANN202"]
"src/finanalytics_ai/application/services/ohlc_1m_service.py"                = ["ANN001", "ANN202"]
"src/finanalytics_ai/application/services/patrimony_service.py"              = ["ANN001"]
"src/finanalytics_ai/infrastructure/adapters/market_data_client.py"          = ["ANN001", "ANN201"]
"src/finanalytics_ai/infrastructure/database/repositories/ticker_service.py" = ["ANN001", "ANN202"]
"src/finanalytics_ai/interfaces/api/routes/fixed_income.py"                  = ["E402"]
"src/finanalytics_ai/interfaces/api/routes/backtest.py"                      = ["E402"]
"src/finanalytics_ai/interfaces/api/run.py"                                  = ["E402"]
"src/finanalytics_ai/workers/**"                                              = ["ANN001", "ANN202"]
"tests/**" = [
    "ANN001", "ANN201", "ANN202", "ANN401", "ANN003",
    "PT011", "PT018", "B017", "B905", "TC003", "E741",
    "SIM222", "SIM300", "PT006", "C408", "RUF015", "F401", "I001",
]

# ─────────────────────────────────────────────
# MYPY
# ─────────────────────────────────────────────
[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = false

# NOTA: disable_error_codes NÃO funciona em overrides (só globalmente).
# Usamos ignore_errors = true por módulo onde os erros são falsos-positivos
# ou demandam refactor de maior porte.

# Camada de interface: FastAPI decorators sem stubs completos (untyped-decorator
# são todos falso-positivos), Pydantic Field overloads, return-value em rotas.
[[tool.mypy.overrides]]
module = [
    "finanalytics_ai.interfaces.api.routes.*",
    "finanalytics_ai.interfaces.api.app",
    "finanalytics_ai.interfaces.api.dependencies",
]
ignore_errors = true

# Workers e serviços com helpers internos não anotados (código legado)
[[tool.mypy.overrides]]
module = [
    "finanalytics_ai.workers.*",
    "finanalytics_ai.application.services.ohlc_1m_service",
    "finanalytics_ai.application.services.rf_portfolio_service",
    "finanalytics_ai.infrastructure.database.repositories.ticker_service",
    "finanalytics_ai.application.services.patrimony_service",
]
ignore_errors = true

# Domínio: bare dict/list sem params (type-arg) — ruído alto, valor baixo
# Refactor gradual para dict[str, Any] programado para sprint de tipagem
[[tool.mypy.overrides]]
module = [
    "finanalytics_ai.domain.*",
    "finanalytics_ai.metrics",
]
ignore_errors = true

# Serviços com union types problemáticos (asyncio.gather retorna list[Any | Exception])
# Requer refactor de gather + TypeVar para resolver adequadamente
[[tool.mypy.overrides]]
module = [
    "finanalytics_ai.application.services.anomaly_service",
    "finanalytics_ai.application.services.correlation_service",
    "finanalytics_ai.application.services.portfolio_optimizer_service",
]
ignore_errors = true

# Infra: SQLAlchemy ORM — Column[T] vs T em atribuições (known mypy+sqlalchemy issue)
# Solução correta: sqlalchemy[mypy] plugin ou sqlalchemy2-stubs — adicionado como issue
[[tool.mypy.overrides]]
module = [
    "finanalytics_ai.infrastructure.database.repositories.*",
    "finanalytics_ai.infrastructure.database.*",
]
ignore_errors = true

# config.py Settings instanciado sem args (valores vêm de env)
[[tool.mypy.overrides]]
module = ["finanalytics_ai.config"]
ignore_errors = true

# ─────────────────────────────────────────────
# PYTEST
# ─────────────────────────────────────────────
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
