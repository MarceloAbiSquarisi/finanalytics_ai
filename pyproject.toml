[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "finanalytics_ai"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn>=0.30.0",
    "starlette>=0.37.0",
    "python-multipart>=0.0.9",
    "pydantic>=2.12.0",
    "pydantic-settings>=2.13.0",
    "python-dotenv>=1.2.0",
    "annotated-types>=0.7.0",
    "sqlalchemy>=2.0.48",
    "asyncpg>=0.31.0",
    "alembic>=1.18.0",
    "greenlet>=3.3.0",
    "redis>=7.3.0",
    "bcrypt==4.0.1",
    "passlib>=1.7.4",
    "python-jose>=3.5.0",
    "cryptography>=46.0.0",
    "pyasn1>=0.6.0",
    "rsa>=4.9.0",
    "ecdsa>=0.19.0",
    "aiohttp>=3.13.0",
    "httpx>=0.28.0",
    "numpy>=2.4.0",
    "pandas>=3.0.0",
    "scipy>=1.17.0",
    "tenacity>=9.1.0",
    "structlog>=25.5.0",
    "opentelemetry-api>=1.40.0",
    "opentelemetry-sdk>=1.40.0",
    "prometheus-client>=0.24.0",
    "reportlab>=4.4.0",
    "pillow>=12.1.0",
    "python-dateutil>=2.9.0",
    "click>=8.3.0",
]

[project.optional-dependencies]
forecast = [
    "prophet>=1.1.5",
    "torch>=2.3.0",
    "pytorch-forecasting>=1.0.0",
    "pytorch-lightning>=2.2.0",
    "cmdstanpy>=1.2.0",
]
dev = [
    "ruff>=0.15.0",
    "mypy>=1.19.0",
    "pytest>=9.0.0",
    "pytest-asyncio>=1.0.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.0",
    "httpx>=0.28.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
src = ["src"]
line-length = 110
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "C4", "SIM", "TCH", "ANN", "PT", "RUF"]
ignore = ["ANN401", "RUF001", "RUF002", "RUF003", "TC001", "TC002", "TC003"]

[tool.ruff.lint.per-file-ignores]
"src/finanalytics_ai/interfaces/api/**"                                      = ["B008", "ANN001", "ANN201", "ANN202"]
"src/finanalytics_ai/application/services/fixed_income_service.py"           = ["E402"]
"src/finanalytics_ai/application/services/fund_analysis_service.py"          = ["E501"]
"src/finanalytics_ai/application/services/rf_portfolio_service.py"           = ["E402", "ANN202"]
"src/finanalytics_ai/application/services/ohlc_1m_service.py"                = ["ANN001", "ANN202"]
"src/finanalytics_ai/application/services/patrimony_service.py"              = ["ANN001"]
"src/finanalytics_ai/infrastructure/adapters/market_data_client.py"          = ["ANN001", "ANN201"]
"src/finanalytics_ai/infrastructure/database/repositories/ticker_service.py" = ["ANN001", "ANN202"]
"src/finanalytics_ai/interfaces/api/routes/fixed_income.py"                  = ["E402"]
"src/finanalytics_ai/interfaces/api/routes/backtest.py"                      = ["E402"]
"src/finanalytics_ai/interfaces/api/run.py"                                  = ["E402"]
"src/finanalytics_ai/workers/**"                                              = ["ANN001", "ANN202"]
"tests/**" = [
    "ANN001", "ANN201", "ANN202", "ANN401", "ANN003",
    "PT011", "PT018", "B017", "B905", "TC003", "E741",
    "SIM222", "SIM300", "PT006", "C408", "RUF015", "F401", "I001",
]

[tool.mypy]
python_version = "3.12"
mypy_path = "src"
explicit_package_bases = true
ignore_missing_imports = true
warn_unused_ignores = false
warn_return_any = false
# Nenhum override com ignore_errors — todos os módulos são verificados.
# Overrides apenas para stubs incompletos de bibliotecas terceiras:

[[tool.mypy.overrides]]
module = [
    "confluent_kafka.*",
    "opentelemetry.*",
    "prometheus_client.*",
    "reportlab.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "--strict-markers --tb=short"

[tool.pytest.ini_options.markers]
unit = "Unit tests"
integration = "Integration tests (require external services)"
slow = "Slow tests (skipped by default in CI)"

[tool.coverage.run]
source = ["src/finanalytics_ai"]
omit = [
    # Infraestrutura de DB — testada via integration tests (não unit)
    "src/finanalytics_ai/infrastructure/database/repositories/*",
    "src/finanalytics_ai/infrastructure/timescale/*",
    # Adapters externos — requerem rede real
    "src/finanalytics_ai/infrastructure/adapters/anbima_client.py",
    "src/finanalytics_ai/infrastructure/adapters/tesouro_client.py",
    # FastAPI routes — testadas via integration/e2e
    "src/finanalytics_ai/interfaces/api/routes/*",
    "src/finanalytics_ai/interfaces/api/app.py",
    "src/finanalytics_ai/interfaces/api/run.py",
    # Workers — testados via integration
    "src/finanalytics_ai/workers/*",
    # Infraestrutura de cache/queue com backends reais
    "src/finanalytics_ai/infrastructure/cache/dependencies.py",
    "src/finanalytics_ai/infrastructure/queue/kafka_adapter.py",
    "src/finanalytics_ai/infrastructure/notifications/*",
    # Reports — dependem de ReportLab (visual)
    "src/finanalytics_ai/infrastructure/reports/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "@abstractmethod",
]
