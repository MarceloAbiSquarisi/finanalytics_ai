[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "finanalytics-ai"
version = "0.1.0"
description = "FinAnalytics AI — Framework de Análise e Busca de Investimentos"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Proprietary" }
authors = [{ name = "FinAnalytics AI Team" }]

dependencies = [
    # Async HTTP
    "aiohttp>=3.9",
    "httpx>=0.27",
    # Database (async)
    "asyncpg>=0.29",
    "sqlalchemy[asyncio]>=2.0",
    "alembic>=1.13",
    # Data validation & settings
    "pydantic>=2.7",
    "pydantic-settings>=2.2",
    # Structured logging
    "structlog>=24.1",
    # Retry / resilience
    "tenacity>=8.3",
    # Cache / rate limiting
    "redis>=5.0",
    # Auth
    "python-jose[cryptography]>=3.3",
    "passlib[bcrypt]>=1.7",
    # PDF reports
    "reportlab>=4.0",
    # Observability
    "opentelemetry-api>=1.24",
    "opentelemetry-sdk>=1.24",
    "prometheus-client>=0.20",
    # Numerics & time series
    "numpy>=1.26",
    "pandas>=2.2",
    "scipy>=1.13",
    # Environment
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "pytest-mock>=3.14",
    "mypy>=1.10",
    "ruff>=0.4",
    "black>=24.4",
    "types-python-dotenv",
    "sqlalchemy[mypy]",
]

[project.scripts]
finanalytics = "finanalytics_ai.interfaces.cli.commands:main"

# ── pytest ────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = [
    "--strict-markers",
    "--tb=short",
    "-v",
    "--cov=src/finanalytics_ai",
    "--cov-report=term-missing",
    "--cov-report=html:reports/coverage",
]
markers = [
    "unit: fast, isolated unit tests",
    "integration: tests that hit real I/O (db, network)",
    "slow: tests that take more than 1s",
]

# ── mypy ──────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.12"
strict = true
# src layout — tell mypy where to look
mypy_path = "src"
packages = ["finanalytics_ai"]
# Plugins
plugins = ["pydantic.mypy", "sqlalchemy.ext.mypy.plugin"]

# Relax only for third-party stubs that aren't typed
[[tool.mypy.overrides]]
module = ["aiohttp.*", "asyncpg.*", "tenacity.*", "scipy.*", "pandas.*"]
ignore_missing_imports = true

# ── ruff ──────────────────────────────────────────────────────────────────────
[tool.ruff]
src = ["src"]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E", "W",   # pycodestyle
    "F",        # pyflakes
    "I",        # isort
    "UP",       # pyupgrade
    "B",        # flake8-bugbear
    "C4",       # flake8-comprehensions
    "SIM",      # flake8-simplify
    "TCH",      # flake8-type-checking
    "ANN",      # flake8-annotations
    "PT",       # flake8-pytest-style
    "RUF",      # ruff-specific rules
]
ignore = [
    "ANN101",  # self annotation — unnecessary
    "ANN102",  # cls annotation — unnecessary
]

[tool.ruff.lint.isort]
known-first-party = ["finanalytics_ai"]

[tool.ruff.format]
# Make ruff format compatible with black
quote-style = "double"
indent-style = "space"

# ── black ─────────────────────────────────────────────────────────────────────
[tool.black]
line-length = 100
target-version = ["py312"]

# ── coverage ──────────────────────────────────────────────────────────────────
[tool.coverage.run]
source = ["src/finanalytics_ai"]
omit = ["*/migrations/*", "*/__init__.py"]

[tool.coverage.report]
show_missing = true
fail_under = 80

# ── hatch (build) ─────────────────────────────────────────────────────────────
[tool.hatch.build.targets.wheel]
packages = ["src/finanalytics_ai"]

# Sprint 2 additions (append to [project] dependencies manually)
