# Prometheus config — FinAnalyticsAI observability stack
#
# Scrape targets:
#   - finanalytics_api (Docker, porta 8000) — 42 metrics finanalytics_*
#     (Sprint Fix Alerts 21/abr — antes ausente; quebrava 5/9 alert rules)
#   - profit_agent (host Windows, porta 8002) via host.docker.internal
#   - di1_realtime_worker (Docker, porta 9101)
#
# Para aplicar mudancas sem restart do container:
#   docker exec -it finanalytics_prometheus kill -HUP 1

global:
  scrape_interval:     30s
  evaluation_interval: 30s
  external_labels:
    env: local
    cluster: finanalytics-ai

scrape_configs:
  # API FastAPI :8000 — expoe finanalytics_http_*, finanalytics_brapi_*,
  # finanalytics_dead_letter_*, finanalytics_portfolio_operations_*, etc.
  # Service name no docker network: 'api' (mas container name e
  # finanalytics_api). Usar service name do compose.
  - job_name: 'finanalytics_api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'finanalytics_api'
          component: 'fastapi'

  - job_name: 'profit_agent'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8002']
        labels:
          service: 'profit_agent'
          component: 'dll_wrapper'

  - job_name: 'di1_realtime_worker'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['finanalytics_di1_realtime:9101']
        labels:
          service: 'di1_realtime_worker'
          component: 'rates'

  # Sprint Fix Alerts F (21/abr): scheduler expoe scheduler_job_runs_total
  # + scheduler_reconcile_errors_total para alert rules de reconcile/job
  # failures. Container scheduler bind no docker network como
  # 'finanalytics_scheduler' (container_name).
  - job_name: 'scheduler_worker'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['finanalytics_scheduler:9102']
        labels:
          service: 'scheduler_worker'
          component: 'jobs'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
