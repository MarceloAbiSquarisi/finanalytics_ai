# Grafana Alerting — notification policies (Sprint Fix Alerts D, 21/abr/2026)
#
# Pushover-only routing:
#   - severity=critical → pushover-critical (priority 1, som siren)
#   - demais            → pushover-default  (priority 0, push silencioso)
apiVersion: 1

policies:
  - orgId: 1
    receiver: pushover-default
    group_by:
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: pushover-critical
        matchers:
          - severity = critical
        group_wait: 15s
        group_interval: 2m
        repeat_interval: 30m
