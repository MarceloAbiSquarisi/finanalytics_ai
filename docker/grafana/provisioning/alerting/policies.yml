# Grafana Alerting — notification policies (Sprint V3, 21/abr/2026)
#
# Default route -> default-internal (sem envio externo).
# severity=critical -> slack-ops.
apiVersion: 1

policies:
  - orgId: 1
    receiver: default-internal
    group_by:
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: slack-ops
        matchers:
          - severity = critical
        group_wait: 15s
        repeat_interval: 30m
