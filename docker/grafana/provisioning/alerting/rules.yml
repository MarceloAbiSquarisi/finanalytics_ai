# Grafana Alerting — rule definitions (Sprint V3, 21/abr/2026)
#
# Cinco regras pinadas a metricas Prometheus que ja existem no app:
#
#  1. high_dead_letter_rate     — dead_letter_total cresce > 0.1/s
#                                 em janela de 5m (eventos sendo
#                                 movidos para DLQ — investigacao
#                                 manual recomendada).
#  2. di1_kafka_errors          — di1_worker_kafka_errors_total > 0
#                                 em janela de 5m (publisher do
#                                 worker DI1 falhando).
#  3. profit_agent_db_disconnect — profit_agent_db_connected == 0
#                                 por 2m (DLL desconectou do
#                                 broker; ordens nao executam).
#  4. di1_tick_age_high         — di1_worker_last_tick_age_seconds
#                                 > 120s por 3m em horario de pregao
#                                 (worker silencioso).
#  5. probe_duration_spike      — p95 das probe_duration_seconds
#                                 > 5s em janela de 10m (latencia
#                                 da DLL anormal).
#
# Severidades: 1+3+4 = critical (vai para Slack). 2+5 = warning
# (apenas painel interno).
apiVersion: 1

groups:
  - orgId: 1
    name: finanalytics-core
    folder: FinAnalytics
    interval: 1m
    rules:
      # ── 1. Dead-letter spike ──
      - uid: alert-dead-letter-rate
        title: high_dead_letter_rate
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus_main  # Prometheus default uid
            model:
              editorMode: code
              expr: 'sum(rate(finanalytics_dead_letter_total[5m])) > 0.1'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: 'Dead-letter rate > 0.1 evt/s nos ultimos 5min'
          description: 'Eventos estao sendo movidos para DLQ. Verifique /hub events.'
          runbook_url: 'https://github.com/MarceloAbiSquarisi/finanalytics_ai/blob/master/docs/runbook_dead_letter.md'
        labels:
          severity: critical
          team: ops

      # ── 2. DI1 Kafka publisher errors ──
      - uid: alert-di1-kafka-errors
        title: di1_kafka_errors
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus_main
            model:
              editorMode: code
              expr: '(increase(di1_worker_kafka_errors_total[5m]) > 0) and on() (finanalytics_market_open == 1)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: 'DI1 worker tem erros publicando no Kafka'
          description: 'Verifique logs do container di1_worker.'
        labels:
          severity: warning
          team: data
          pregao_only: "true"

      # ── 3. profit_agent DB disconnected ──
      - uid: alert-profit-agent-db-down
        title: profit_agent_db_disconnect
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 180
              to: 0
            datasourceUid: prometheus_main
            model:
              editorMode: code
              expr: '(profit_agent_db_connected == 0) and on() (finanalytics_market_open == 1)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: 'profit_agent reporta DB desconectado'
          description: 'DLL nao esta enviando ordens — verifique conexao Nelogica.'
          runbook_url: 'https://github.com/MarceloAbiSquarisi/finanalytics_ai/blob/master/docs/runbook_profit_agent.md'
        labels:
          severity: critical
          team: trading
          pregao_only: "true"

      # ── 4. DI1 tick age elevado durante pregao ──
      - uid: alert-di1-tick-age
        title: di1_tick_age_high
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus_main
            model:
              editorMode: code
              # > 120s sem tick (worker congelou ou broker mudo).
              # Filter `AND on() finanalytics_market_open == 1` cobre
              # weekends, horarios E feriados B3 — sem alerta fora pregao.
              expr: '(di1_worker_last_tick_age_seconds > 120) and on() (finanalytics_market_open == 1)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 3m
        annotations:
          summary: 'Sem ticks DI1 ha mais de 2min (em pregao)'
          description: 'di1_worker pode estar congelado ou broker desconectado. Mute fora de Mon-Fri 09:30-18:30 BRT (sem ticks fora pregao e esperado).'
        labels:
          severity: critical
          team: data
          pregao_only: "true"

      # ── 5. Probe duration spike ──
      - uid: alert-probe-duration
        title: probe_duration_spike
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus_main
            model:
              editorMode: code
              expr: |
                (histogram_quantile(0.95,
                  rate(profit_agent_probe_duration_seconds_bucket[10m])
                ) > 5) and on() (finanalytics_market_open == 1)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 10m
        annotations:
          summary: 'P95 probe duration DLL > 5s em 10min'
          description: 'Latencia da DLL elevada — verifique CPU host Windows.'
        labels:
          severity: warning
          team: ops
          pregao_only: "true"

      # ── 6. API latency p95 alta (Sprint Z3, 21/abr) ──
      - uid: alert-api-latency-p95
        title: api_latency_p95_high
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus_main
            model:
              editorMode: code
              expr: |
                histogram_quantile(0.95,
                  sum by (le) (rate(finanalytics_http_request_duration_seconds_bucket[5m]))
                ) > 2
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 10m
        annotations:
          summary: 'P95 latencia API > 2s em 10min'
          description: 'API FastAPI com latencia elevada — verifique DB/Timescale e /api/v1/ml/signals.'
        labels:
          severity: warning
          team: api

      # ── 7. API 5xx rate alta (Sprint Z3, 21/abr) ──
      - uid: alert-api-5xx-rate
        title: api_5xx_rate_high
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus_main
            model:
              editorMode: code
              expr: |
                (sum(rate(finanalytics_http_requests_total{status_code=~"5.."}[5m]))
                /
                sum(rate(finanalytics_http_requests_total[5m]))) > 0.05
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: 'API 5xx rate > 5% em 5min'
          description: 'Erros 5xx acima do normal. Verifique logs + correlation_id das requests.'
        labels:
          severity: critical
          team: api

      # ── 8. BRAPI errors (Sprint Z3, 21/abr) ──
      - uid: alert-brapi-errors
        title: brapi_errors_high
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus_main
            model:
              editorMode: code
              expr: |
                (sum(increase(finanalytics_brapi_requests_total{status="error"}[15m])) > 10)
                and on() (finanalytics_market_open == 1)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: 'BRAPI: >10 erros em 15min'
          description: 'Fonte de dados BRAPI instavel. Considere fallback para Fintz/DLL.'
        labels:
          severity: warning
          team: data
          pregao_only: "true"

      # ── 9. Portfolio ops burst (anomalia comportamental; Sprint Z3) ──
      - uid: alert-portfolio-ops-burst
        title: portfolio_ops_burst
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus_main
            model:
              editorMode: code
              expr: |
                sum(rate(finanalytics_portfolio_operations_total[5m])) > 10
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 3m
        annotations:
          summary: 'Rate de operacoes de portfolio > 10/s em 5min'
          description: 'Possivel loop bug, trade automation descontrolado ou ataque. Revisar /api/v1/wallet/* e /api/v1/portfolios/*.'
        labels:
          severity: warning
          team: security

      # ── 10. ML drift — pickles ausentes para tickers calibrados ──
      # Sprint Fix Alerts E (21/abr): usa finanalytics_ml_drift_count
      # populada a cada 5min por ml_metrics_refresh_loop.
      - uid: alert-ml-drift
        title: ml_drift_high
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus_main
            model:
              editorMode: code
              expr: 'finanalytics_ml_drift_count > 5'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 30m
        annotations:
          summary: 'ML: > 5 tickers calibrados sem pickle'
          description: 'Calibracao recente nao foi acompanhada de retreino. Rodar scripts/retrain_top20_h21.py ou variante por ticker.'
        labels:
          severity: warning
          team: ml

      # ── 11. ML snapshot stale ──
      # signal_history snapshot devia rodar diario 18:30 BRT.
      # Se age > 2 dias, scheduler quebrou ou job falha em silencio.
      - uid: alert-ml-snapshot-stale
        title: ml_snapshot_stale
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus_main
            model:
              editorMode: code
              expr: 'finanalytics_ml_snapshot_age_days > 2'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 1h
        annotations:
          summary: 'ML signal_history > 2 dias desatualizado'
          description: 'Job snapshot diario (18:30 BRT) parou de rodar. Verificar scheduler logs.'
        labels:
          severity: critical
          team: ml

      # ── 13. Scheduler data jobs com falhas repetidas (28/abr) ──
      # yahoo_bars / fii_fund / crypto_signals / cvm_informe usam o counter
      # scheduler_job_runs_total{job, status="error"}. Tolera 1 erro pontual
      # (transient — Yahoo throttle, Status Invest layout muda, etc).
      # >=3 erros em 6h indica que o job esta quebrado e dados estao desatualizando.
      - uid: alert-scheduler-data-jobs-errors
        title: scheduler_data_jobs_errors
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 21600
              to: 0
            datasourceUid: prometheus_main
            model:
              editorMode: code
              expr: |
                sum by (job) (
                  increase(scheduler_job_runs_total{
                    job=~"yahoo_bars|fii_fund|crypto_signals|cvm_informe",
                    status="error"
                  }[6h])
                ) >= 3
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 10m
        annotations:
          summary: 'Job de dados do scheduler com >=3 falhas em 6h'
          description: 'Um dos jobs (yahoo_bars/fii_fund/crypto_signals/cvm_informe) falhou repetidamente. Verificar logs do scheduler. Job em label.'
          runbook_url: 'https://github.com/MarceloAbiSquarisi/finanalytics_ai/blob/master/scripts'
        labels:
          severity: warning
          team: data

      # ── 14. fii_fundamentals stale (28/abr) ──
      # Se o scraping para de rodar, dy_ttm/p_vp em /signals viram null. Alert
      # em pregao se ultimo snapshot tem >2 dias (job devia rodar daily 7h BRT).
      # Usa metrica gerada por uma probe — fica como follow-up implementar
      # finanalytics_fii_fundamentals_age_days. Por ora, gauge derivada via
      # scrape do TimescaleDB seria caminho. Documenta intencao no annotation.
      - uid: alert-fii-fund-stale
        title: fii_fundamentals_stale
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: prometheus_main
            model:
              editorMode: code
              # Aproximacao: se nao houve nenhuma execucao OK em 48h, considera stale.
              # Quando a metrica fii_fundamentals_age_days for exposta, trocar para ela.
              expr: |
                (sum(increase(scheduler_job_runs_total{job="fii_fund", status="ok"}[48h])) == 0)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: NoData
        execErrState: Error
        for: 1h
        annotations:
          summary: 'fii_fund job sem execucao bem-sucedida em 48h'
          description: 'Status Invest scraper parou. /signals nao tera dy_ttm/p_vp atualizados. Verificar host.'
        labels:
          severity: warning
          team: data

      # ── 12. Scheduler reconcile errors (Sprint Fix Alerts F, 21/abr) ──
      # scheduler_reconcile_errors_total incrementa em qualquer falha
      # do reconcile_loop (HTTP error 4xx/5xx do profit_agent ou network
      # exception). Ate 3 erros em 30min e tolerado (profit_agent restart);
      # acima disso, profit_agent provavelmente offline em horario de
      # pregao — investigar.
      - uid: alert-scheduler-reconcile-errors
        title: scheduler_reconcile_errors_high
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: prometheus_main
            model:
              editorMode: code
              expr: '(increase(scheduler_reconcile_errors_total[30m]) > 3) and on() (finanalytics_market_open == 1)'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: 'Reconcile DLL <-> DB: > 3 falhas em 30min'
          description: 'Loop de reconciliacao do scheduler nao consegue contactar profit_agent. Verificar host Windows.'
        labels:
          severity: warning
          team: trading
          pregao_only: "true"
