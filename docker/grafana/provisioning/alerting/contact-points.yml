# Grafana Alerting — contact points (Sprint Fix Alerts D, 21/abr/2026)
#
# ARQUITETURA: Pushover-only.
#   - Substituiu email noop (sem SMTP) e slack-ops placeholder
#     (workspace nao configurado).
#   - Pushover: 1-time fee USD 5 por plataforma (iOS/Android/Desktop),
#     API HTTP simples, push notification confiavel, suporta priority
#     nativo, retries automaticos.
#
# DOIS RECEIVERS por priority:
#   - pushover-default  (priority=0): warnings, info — silent push.
#   - pushover-critical (priority=1): alertas criticos — som padrao,
#     bypass do quiet hours do device. (Para emergency=2 que toca
#     ate user reconhecer manualmente, criar pushover-emergency.)
#
# CREDENCIAIS via env vars no container Grafana:
#   GRAFANA_PUSHOVER_USER_KEY  - user key (perfil em pushover.net)
#   GRAFANA_PUSHOVER_APP_TOKEN - app token (criar app FinAnalytics
#                                em pushover.net/apps/build)
# Vazio => Grafana loga erro por tentativa de send mas nao quebra.
apiVersion: 1

contactPoints:
  - orgId: 1
    name: pushover-default
    receivers:
      - uid: pushover-default
        type: pushover
        settings:
          # Placeholders default — Grafana exige valores nao-vazios em
          # provisioning. Sobrescrever no .env com chaves reais ativa
          # entrega; sem isso, Grafana tenta send mas Pushover API
          # responde "invalid token" (logado, nao crasha).
          # Grafana exige format Pushover (30 chars alfanumericos) +
          # nao suporta `${VAR:-default}`. Truque: env var sempre setada
          # via docker-compose com placeholder valido (30x 'a'). Ao
          # configurar credenciais reais, override em .env e recreate.
          userKey: $GRAFANA_PUSHOVER_USER_KEY
          apiToken: $GRAFANA_PUSHOVER_APP_TOKEN
          priority: "0"           # normal — push silencioso
          okPriority: "-1"        # resolved messages: lowest priority
          retry: 60               # segundos entre retries
          expire: 3600            # parar retry apos 1h
          title: |
            FinAnalytics: {{ .CommonLabels.alertname }}
          message: |
            {{ .Status | toUpper }}
            {{ range .Alerts -}}
            {{ .Annotations.summary }}
            value: {{ .ValueString }}
            {{ if .Annotations.runbook_url }}runbook: {{ .Annotations.runbook_url }}{{ end }}
            {{ end }}
        disableResolveMessage: false

  - orgId: 1
    name: pushover-critical
    receivers:
      - uid: pushover-critical
        type: pushover
        settings:
          # Grafana exige format Pushover (30 chars alfanumericos) +
          # nao suporta `${VAR:-default}`. Truque: env var sempre setada
          # via docker-compose com placeholder valido (30x 'a'). Ao
          # configurar credenciais reais, override em .env e recreate.
          userKey: $GRAFANA_PUSHOVER_USER_KEY
          apiToken: $GRAFANA_PUSHOVER_APP_TOKEN
          priority: "1"           # high — som padrao, bypass quiet hours
          okPriority: "0"
          sound: "siren"          # som distinto para criticos
          retry: 60
          expire: 7200            # 2h para criticos
          title: |
            [CRITICAL] {{ .CommonLabels.alertname }}
          message: |
            {{ .Status | toUpper }}
            severity: {{ .CommonLabels.severity }}
            team: {{ .CommonLabels.team }}
            {{ range .Alerts -}}
            {{ .Annotations.summary }}
            {{ .Annotations.description }}
            value: {{ .ValueString }}
            {{ if .Annotations.runbook_url }}runbook: {{ .Annotations.runbook_url }}{{ end }}
            {{ end }}
        disableResolveMessage: false
