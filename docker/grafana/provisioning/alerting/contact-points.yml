# Grafana Alerting — contact points (Sprint V3, 21/abr/2026)
#
# Provisiona contact points reproduziveis. Definir Slack webhook em
# .env como GRAFANA_SLACK_WEBHOOK; se vazio, alertas vao apenas para
# o painel de notificacoes interno (UI Grafana > Alerting > History).
#
# Doc: https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/
apiVersion: 1

contactPoints:
  # Default receiver: email hardcoded. Sem SMTP configurado no Grafana,
  # Grafana tenta enviar e falha silencioso — alertas ainda aparecem em
  # /alerting/list e /alerting/history para inspecao manual. Trocar
  # para SMTP real quando GRAFANA_SMTP_HOST for configurado.
  - orgId: 1
    name: default-internal
    receivers:
      - uid: default-internal
        type: email
        settings:
          addresses: ops@finanalytics.local
          singleEmail: false
        disableResolveMessage: false

  # Slack: URL fake por padrao (Grafana aceita como webhook, POST
  # silencioso falha sem afetar provisioning). Sobrescrever via env
  # GRAFANA_SLACK_WEBHOOK no compose quando o workspace estiver pronto.
  # Formato: https://hooks.slack.com/services/T.../B.../xxx
  - orgId: 1
    name: slack-ops
    receivers:
      - uid: slack-ops
        type: slack
        settings:
          url: https://hooks.slack.com/services/PLACEHOLDER/PLACEHOLDER/PLACEHOLDER
          recipient: "#alerts"
          username: FinAnalytics Grafana
          title: |
            {{ if eq .Status "firing" }}[FIRING]{{ else }}[RESOLVED]{{ end }} {{ .CommonLabels.alertname }}
          text: |
            *Status*: {{ .Status }}
            *Severity*: {{ .CommonLabels.severity }}
            {{ range .Alerts -}}
            * {{ .Annotations.summary }}
              {{ if .Annotations.runbook_url }}runbook: {{ .Annotations.runbook_url }}{{ end }}
              value: `{{ .ValueString }}`
            {{ end }}
        disableResolveMessage: false
